<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외쳐라! 이 배우 이 작품</title>
    <style>
        :root { --primary: #6c5ce7; --accent: #ff4757; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app-container { max-width: 480px; width: 100%; min-height: 100vh; background: white; box-shadow: 0 0 30px rgba(0,0,0,0.1); padding: 40px 20px; box-sizing: border-box; }
        
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .btn-shout { background: var(--primary); color: white; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }

        .tmdb-results { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; max-height: 300px; overflow-y: auto; }
        .tmdb-item { cursor: pointer; border: 2px solid transparent; border-radius: 8px; overflow: hidden; background: #f8f9fa; }
        .tmdb-item.selected { border-color: var(--accent); background: #fff1f2; }
        .tmdb-item img { width: 100%; height: 120px; object-fit: cover; }
        .tmdb-item p { font-size: 11px; padding: 5px; margin: 0; text-align: center; }

        .actor-card { background: #f1f0ff; color: var(--primary); padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .back-link { color: #888; cursor: pointer; text-decoration: underline; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-main" class="screen active">
        <h1 style="text-align: center;">📣 외쳐라! <br>이 배우 이 작품</h1>
        <button class="btn-shout" onclick="goScreen('screen-actor-search')">입덕작 외치기</button>
        <button style="background:#eee;" onclick="initListPage()">입덕작 확인</button>
    </div>

    <div id="screen-actor-search" class="screen">
        <span class="back-link" onclick="goScreen('screen-main')">홈으로</span>
        <h2>먼저, 배우를 찾으세요</h2>
        <input type="text" id="actorInput" placeholder="배우 이름을 입력하세요">
        <button class="btn-shout" onclick="searchActor()">배우 확인</button>
        <div id="actor-search-result"></div>
    </div>

    <div id="screen-work-search" class="screen">
        <span class="back-link" onclick="goScreen('screen-actor-search')">뒤로가기</span>
        <h2 id="display-actor-name" class="highlight"></h2>
        <p>이 배우의 입덕 작품을 검색하세요.</p>
        <input type="text" id="workSearchInput" placeholder="작품명(영화 또는 드라마)">
        <button class="btn-shout" onclick="searchTMDB()">작품 찾기</button>
        <div id="tmdb-results" class="tmdb-results"></div>
        
        <div id="final-input-area" style="display:none;">
            <input type="text" id="reasonInput" maxlength="25" placeholder="추천 이유 (20자 내외)">
            <button class="btn-shout" style="background: var(--accent);" onclick="handleShout()">최종 외치기!!!</button>
        </div>
    </div>

    <div id="screen-list" class="screen">... (배우 목록) ...</div>
</div>

<script>
    const TMDB_API_KEY = 'bafae8be027059fc5d4088e658d7a71c'; // TMDB API 키 입력 필요
    let db = {}; 
    let currentActor = "";
    let selectedWork = null;

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // [로직 1] 배우 검색
    function searchActor() {
        const name = document.getElementById('actorInput').value.trim();
        if(!name) return;
        
        currentActor = name;
        const resultArea = document.getElementById('actor-search-result');
        
        if(db[name]) {
            resultArea.innerHTML = `<div class="actor-card" onclick="goToWorkSearch()">"${name}" 배우님 찾음! (클릭해서 계속)</div>`;
        } else {
            resultArea.innerHTML = `
                <p style="text-align:center; color:#666;">아직 등록되지 않은 배우입니다.</p>
                <button class="btn-shout" onclick="goToWorkSearch()">"${name}" 직접 추가하고 계속하기</button>
            `;
        }
    }

    function goToWorkSearch() {
        document.getElementById('display-actor-name').innerText = `✨ ${currentActor}`;
        // 배우 검색 창 초기화
        document.getElementById('tmdb-results').innerHTML = "";
        document.getElementById('final-input-area').style.display = 'none';
        goScreen('screen-work-search');
    }

    // [로직 2] 작품 검색 (TMDB)
    async function searchTMDB() {
        const query = document.getElementById('workSearchInput').value.trim();
        if(!query) return;

        const url = `https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=ko-KR`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            renderTMDBResults(data.results);
        } catch (error) {
            alert("작품 검색 중 오류가 발생했습니다.");
        }
    }

    function renderTMDBResults(results) {
        const area = document.getElementById('tmdb-results');
        area.innerHTML = "";
        results.forEach(item => {
            if(!item.title && !item.name) return;
            const title = item.title || item.name;
            const poster = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : 'https://via.placeholder.com/200x300?text=No+Image';
            
            const div = document.createElement('div');
            div.className = 'tmdb-item';
            div.innerHTML = `<img src="${poster}"><p>${title}</p>`;
            div.onclick = () => {
                // 선택 시각화
                document.querySelectorAll('.tmdb-item').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedWork = { title, poster };
                document.getElementById('final-input-area').style.display = 'block';
            };
            area.appendChild(div);
        });
    }

    // [로직 3] 최종 저장
    function handleShout() {
        const reason = document.getElementById('reasonInput').value.trim();
        
        if(!db[currentActor]) db[currentActor] = {};
        if(!db[currentActor][selectedWork.title]) {
            db[currentActor][selectedWork.title] = { count: 0, poster: selectedWork.poster, reasons: [], tags: [] };
        }

        db[currentActor][selectedWork.title].count++;
        if(reason) db[currentActor][selectedWork.title].reasons.push(reason);

        alert(`${currentActor} 배우의 입덕작 "${selectedWork.title}" 외치기 완료!`);
        
        // 초기화 및 메인 이동
        document.getElementById('actorInput').value = "";
        document.getElementById('workSearchInput').value = "";
        document.getElementById('reasonInput').value = "";
        goScreen('screen-main');
    }
</script>

</body>
</html>
