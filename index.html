<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕질 기록소 : 몽글</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&display=swap');
        :root { --main: #a29bfe; --sub: #fab1a0; --bg: #fff9f9; --text: #4b4b4b; --white: #ffffff; }
        body { font-family: 'Nanum Square Round', sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }
        .app-container { width: 100%; max-width: 1000px; margin: 0 auto; min-height: 100vh; background: var(--white); padding: 60px 40px; box-sizing: border-box; box-shadow: 0 0 40px rgba(0,0,0,0.02); }
        .screen { display: none; animation: softIn 0.5s ease-out; }
        .screen.active { display: block; }
        @keyframes softIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-weight: 800; font-size: 2.8rem; color: var(--main); text-align: center; margin-bottom: 50px; }
        h2 { font-weight: 800; font-size: 1.8rem; margin-bottom: 25px; }
        button { padding: 18px 28px; border: none; border-radius: 25px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s; font-family: 'Nanum Square Round'; display: inline-flex; align-items: center; justify-content: center; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .btn-main { background: var(--main); color: white; width: 100%; }
        .btn-sub { background: var(--sub); color: white; }
        .btn-gray { background: #f1f2f6; color: #7f8c8d; }
        input { width: 100%; padding: 18px 25px; margin-bottom: 20px; border: 2px solid #f0f0f0; border-radius: 22px; box-sizing: border-box; font-size: 1rem; background: #fafafa; }
        .tag-selector { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .tag-chip { padding: 10px 22px; border: 2px solid #eee; border-radius: 30px; font-size: 0.9rem; cursor: pointer; background: white; font-weight: 700; }
        .tag-chip.selected { background: var(--main); color: white; border-color: var(--main); }
        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin: 25px 0; }
        .tmdb-item { border-radius: 25px; overflow: hidden; background: #fff; cursor: pointer; border: 4px solid transparent; box-shadow: 0 10px 20px rgba(0,0,0,0.04); transition: 0.3s; }
        .tmdb-item.selected { border-color: var(--sub); transform: scale(1.03); }
        .tmdb-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .tmdb-item p { padding: 12px; margin: 0; font-size: 0.9rem; font-weight: 700; text-align: center; }
        .record-cloud { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 35px; justify-content: center; padding: 40px 0; }
        .cloud-item { position: relative; transition: 0.3s; text-align: center; }
        .cloud-item img { border-radius: 30px; border: 6px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .cloud-item .badge { position: absolute; top: -15px; right: -15px; background: var(--sub); color: white; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 4px solid white; z-index: 10; }
        .theme-card { background: #fdfbff; padding: 30px; border-radius: 35px; margin-bottom: 25px; border: 1px solid #f1f1f1; position: relative; }
        .theme-edit-btn { position: absolute; top: 25px; right: 25px; background: #eee; padding: 6px 15px; border-radius: 15px; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
        .back-link { color: #ccc; cursor: pointer; font-weight: 700; display: inline-block; margin-bottom: 25px; }
        .horizontal-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-main" class="screen active">
        <h1>✨ 몽글몽글<br>우리의 덕질 저장소</h1>
        <div style="display: grid; gap: 15px; max-width: 320px; margin: 0 auto;">
            <button class="btn-main" onclick="initListPage()">입덕작 확인하기</button>
            <button class="btn-gray" onclick="loadThemes()">📂 테마별 추천 확인</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <span class="back-link" onclick="goScreen('screen-main')">← 홈으로</span>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="margin:0;">💖 입덕 기록장</h2>
            <button class="btn-sub" onclick="startShout()">새로운 입덕 외치기 +</button>
        </div>
        <div id="actor-buttons" class="horizontal-scroll"></div>
        <div id="record-display" class="record-cloud"></div>
    </div>

    <div id="screen-actor-search" class="screen">
        <span class="back-link" onclick="goScreen('screen-list')">취소</span>
        <h2>누구에게 입덕했나요?</h2>
        <input type="text" id="actorInput" placeholder="배우님의 이름을 입력해주세요">
        <button class="btn-main" onclick="confirmActor()">다음으로</button>
    </div>

    <div id="screen-work-search" class="screen">
        <span class="back-link" onclick="goScreen('screen-actor-search')">이전으로</span>
        <h2 id="current-target" style="color: var(--main);"></h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="workSearchInput" placeholder="입덕하게 된 작품명을 검색하세요" style="margin:0;">
            <button onclick="searchTMDB('work')" style="background:var(--text); color:white; border-radius:22px; width:70px; font-size:1.5rem;">🔍</button>
        </div>
        <div id="tmdb-results" class="tmdb-results"></div>
        <div id="tag-area" style="display:none; background:#fff9f9; padding:30px; border-radius:30px; border: 2px dashed var(--sub);">
            <h3>어떤 포인트에 반했나요? (최대 2개)</h3>
            <div class="tag-selector" id="tag-selector-work">
                <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                <div class="tag-chip" onclick="toggleTag(this)">#연기천재</div>
                <div class="tag-chip" onclick="toggleTag(this)">#비주얼끝판왕</div>
                <div class="tag-chip" onclick="toggleTag(this)">#케미요정</div>
            </div>
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <input type="text" id="customTagWork" placeholder="나만의 태그 입력" style="margin:0; flex:1;">
                <button onclick="addCustomTag('work')" style="background:#bbb; color:white; border-radius:20px; padding: 10px 20px;">추가</button>
            </div>
            <button class="btn-main" style="background:var(--sub)" onclick="saveShout()">입덕 외치기 완료 ✨</button>
        </div>
    </div>

    <div id="screen-theme-list" class="screen">
        <span class="back-link" onclick="goScreen('screen-main')">← 홈으로</span>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>📂 테마별 추천작</h2>
            <button onclick="openThemeWrite()" class="btn-sub" style="padding:10px 20px; font-size:0.9rem;">테마 만들기 +</button>
        </div>
        <div id="theme-display-area"></div>
    </div>

    <div id="screen-theme-write" class="screen">
        <span class="back-link" onclick="goScreen('screen-theme-list')">취소</span>
        <h2 id="theme-write-title">새 테마 만들기</h2>
        <input type="hidden" id="editingThemeId" value="">
        <input type="text" id="themeNameInput" placeholder="테마 제목 (예: 비오는 날 보고 싶은)">
        <div style="background:#f8f9fa; padding:25px; border-radius:30px; border:2px dashed #ddd; margin-bottom:20px;">
            <h3 style="margin:0;">작품 추가하기</h3>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="themeWorkSearch" placeholder="작품 검색" style="margin:0;">
                <button onclick="searchTMDB('theme')" style="background:var(--text); color:white; border-radius:22px; width:70px; font-size:1.5rem;">🔍</button>
            </div>
            <div id="theme-tmdb-results" class="tmdb-results"></div>
            <div id="theme-tag-area" style="display:none; border-top: 1px solid #eee; padding-top:20px;">
                <p>매력 포인트 (최대 2개)</p>
                <div class="tag-selector" id="tag-selector-theme">
                    <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                </div>
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                    <input type="text" id="customTagTheme" placeholder="태그 직접 입력" style="margin:0; flex:1;">
                    <button onclick="addCustomTag('theme')" style="background:#bbb; color:white; border-radius:20px; padding: 10px 20px;">추가</button>
                </div>
                <button class="btn-main" onclick="addWorkToTheme()">이 작품을 테마에 담기</button>
            </div>
        </div>
        <div id="added-items-preview" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:30px;"></div>
        <button class="btn-main" style="background:#2ecc71" onclick="saveTheme()">테마 저장하기</button>
    </div>
</div>

<script>
    let db = {}; 
    let themes = [];
    let tempEntry = { actor: '', work: null, tags: [] };
    let tempThemeWorks = [];

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function resetInputs() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.querySelectorAll('.tmdb-results').forEach(r => r.innerHTML = "");
        document.querySelectorAll('.tag-chip').forEach(t => t.classList.remove('selected'));
        if(document.getElementById('tag-area')) document.getElementById('tag-area').style.display = 'none';
        if(document.getElementById('theme-tag-area')) document.getElementById('theme-tag-area').style.display = 'none';
    }

    // --- 서버 API 통신 로직 (Proxy 사용) ---
    async function initListPage() {
        goScreen('screen-list');
        try {
            const res = await fetch('/api/proxy?type=records');
            const data = await res.json();
            db = {};
            data.forEach(r => {
                if(!db[r.actor]) db[r.actor] = {};
                if(!db[r.actor][r.work_title]) {
                    db[r.actor][r.work_title] = { count: 1, poster: r.poster_url, tags: r.tags || [] };
                } else {
                    db[r.actor][r.work_title].count++;
                }
            });
            renderActorButtons();
            const actors = Object.keys(db);
            if(actors.length > 0) showActorRecords(actors[0]);
        } catch (e) { console.error(e); }
    }

    async function saveShout() {
        const tags = Array.from(document.querySelectorAll('#tag-selector-work .selected')).map(t => t.innerText);
        const payload = { actor: tempEntry.actor, work_title: tempEntry.work.title, poster_url: tempEntry.work.poster, tags };
        
        const res = await fetch('/api/proxy?type=records', {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        if(res.ok) { alert("기록 완료! ✨"); initListPage(); }
    }

    async function loadThemes() {
        goScreen('screen-theme-list');
        const res = await fetch('/api/proxy?type=themes');
        themes = await res.json();
        renderThemes();
    }

    async function saveTheme() {
        const name = document.getElementById('themeNameInput').value.trim();
        const editId = document.getElementById('editingThemeId').value;
        if(!name || !tempThemeWorks.length) return alert("내용을 채워주세요!");

        const payload = { id: editId || Date.now(), name, works: tempThemeWorks };
        const res = await fetch('/api/proxy?type=themes', {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        if(res.ok) { alert("테마 저장 완료! 📂"); loadThemes(); }
    }

    // --- UI 및 TMDB 검색 로직 ---
    function startShout() { resetInputs(); goScreen('screen-actor-search'); }
    function confirmActor() {
        const val = document.getElementById('actorInput').value.trim();
        if(!val) return;
        tempEntry.actor = val;
        document.getElementById('current-target').innerText = `✨ ${val} 배우님의 입덕작 찾기`;
        goScreen('screen-work-search');
    }

    async function searchTMDB(type) {
        const query = type === 'work' ? document.getElementById('workSearchInput').value : document.getElementById('themeWorkSearch').value;
        const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        const areaId = type === 'work' ? 'tmdb-results' : 'theme-tmdb-results';
        const area = document.getElementById(areaId);
        area.innerHTML = "";
        data.results?.forEach(item => {
            if(!item.poster_path) return;
            const title = item.title || item.name;
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            const div = document.createElement('div');
            div.className = 'tmdb-item';
            div.innerHTML = `<img src="${poster}"><p>${title}</p>`;
            div.onclick = () => {
                tempEntry.work = { title, poster };
                document.querySelectorAll(`#${areaId} .tmdb-item`).forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById(type === 'work' ? 'tag-area' : 'theme-tag-area').style.display = 'block';
            };
            area.appendChild(div);
        });
    }

    function toggleTag(el) {
        const selected = el.parentElement.querySelectorAll('.selected');
        if(el.classList.contains('selected')) el.classList.remove('selected');
        else if(selected.length < 2) el.classList.add('selected');
    }

    function addCustomTag(type) {
        const input = document.getElementById(type === 'work' ? 'customTagWork' : 'customTagTheme');
        if(!input.value.trim()) return;
        const container = document.getElementById(type === 'work' ? 'tag-selector-work' : 'tag-selector-theme');
        const chip = document.createElement('div');
        chip.className = 'tag-chip selected';
        chip.innerText = `#${input.value}`;
        chip.onclick = () => toggleTag(chip);
        container.appendChild(chip);
        input.value = "";
    }

    function renderActorButtons() {
        const actors = Object.keys(db);
        document.getElementById('actor-buttons').innerHTML = actors.map(a => `<button onclick="showActorRecords('${a}')" style="background:white; border:2px solid var(--main); color:var(--main); margin-right:10px; white-space:nowrap; padding: 10px 20px;">${a}</button>`).join('');
    }

    function showActorRecords(actor) {
        const records = db[actor];
        const display = document.getElementById('record-display');
        display.innerHTML = "";
        Object.keys(records).forEach(title => {
            const data = records[title];
            const size = Math.min(180 + (data.count - 1) * 40, 350);
            display.innerHTML += `<div class="cloud-item"><div class="badge">${data.count}</div><img src="${data.poster}" style="width:${size}px;"><p style="margin-top:10px; font-weight:800;">${title}</p><div style="font-size:0.85rem; color:var(--main); font-weight:700;">${data.tags.join(' ')}</div></div>`;
        });
    }

    function renderThemes() {
        const area = document.getElementById('theme-display-area');
        area.innerHTML = themes.map(t => `<div class="theme-card"><div class="theme-edit-btn" onclick="editTheme(${t.id})">수정</div><h3 style="margin-top:0; color:var(--main);"># ${t.name}</h3><div class="horizontal-scroll">${t.works.map(w => `<div style="width:110px; flex-shrink:0; text-align:center;"><img src="${w.poster}" style="width:100%; border-radius:18px;"><p style="font-size:0.75rem; font-weight:800; margin:5px 0;">${w.title}</p></div>`).join('')}</div></div>`).join('');
    }

    function openThemeWrite() { resetInputs(); tempThemeWorks = []; document.getElementById('added-items-preview').innerHTML = ""; document.getElementById('editingThemeId').value = ""; goScreen('screen-theme-write'); }
    function addWorkToTheme() {
        const tags = Array.from(document.querySelectorAll('#tag-selector-theme .selected')).map(t => t.innerText);
        tempThemeWorks.push({ ...tempEntry.work, tags });
        document.getElementById('added-items-preview').innerHTML = tempThemeWorks.map((w, idx) => `<button onclick="tempThemeWorks.splice(${idx},1); this.remove();" style="background:#eee; color:#666; font-size:0.8rem; padding:8px 15px;">${w.title} ✕</button>`).join('');
    }

    function editTheme(id) {
        const theme = themes.find(t => t.id == id);
        if(!theme) return;
        openThemeWrite();
        document.getElementById('themeNameInput').value = theme.name;
        document.getElementById('editingThemeId').value = theme.id;
        tempThemeWorks = [...theme.works];
        document.getElementById('added-items-preview').innerHTML = tempThemeWorks.map((w, idx) => `<button onclick="tempThemeWorks.splice(${idx},1); this.remove();" style="background:#eee; color:#666; font-size:0.8rem; padding:8px 15px;">${w.title} ✕</button>`).join('');
    }
</script>
</body>
</html>
