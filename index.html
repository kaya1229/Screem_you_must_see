<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕질 수납함</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&family=Nanum+Pen+Script&display=swap');
        :root { --main: #78a2cc; --sub: #e59a8a; --bg: #f4f4f2; --paper: #ffffff; --text: #444; --danger: #e74c3c; --handwriting: 'Nanum Pen Script', cursive; }
        body { font-family: 'Nanum Square Round', sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }
        .app-container { width: 100%; max-width: 850px; margin: 60px auto; min-height: 85vh; background: var(--paper); padding: 50px 30px; box-sizing: border-box; box-shadow: 15px 15px 0px rgba(0,0,0,0.03); border: 1px solid #ddd; position: relative; }
        
        /* 탭 메뉴 */
        .tab-menu { display: none; gap: 5px; position: absolute; top: -45px; left: 20px; }
        .tab-btn { padding: 12px 25px; background: #d1d1cf; border-radius: 12px 12px 0 0; border: 1px solid #bbb; border-bottom: none; cursor: pointer; font-weight: 700; color: #777; transition: 0.2s; }
        .tab-btn.active { background: var(--paper); color: var(--main); height: 50px; margin-top: -5px; z-index: 2; }

        .screen { display: none; animation: drawerOpen 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes drawerOpen { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; font-size: 2.2rem; color: var(--main); text-align: center; margin-bottom: 40px; }
        h2 { font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        .btn-main { background: var(--main); color: white; width: 100%; margin-top: 10px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-inline { display: inline-block !important; }

        .record-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; margin-top: 20px; }
        .ticket { background: #fff; border: 1px solid #eee; border-radius: 10px; overflow: hidden; box-shadow: 5px 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .ticket img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-bottom: 2px dashed #eee; }
        .ticket-tags { font-family: var(--handwriting); font-size: 1.1rem; color: var(--main); margin: 5px 0; min-height: 1.2em; }

        .theme-card { background: #fffef0; padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #eee; }
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .theme-poster-box { text-align: center; }
        .theme-poster-box img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); }

        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .tmdb-item { cursor: pointer; border-radius: 8px; overflow: hidden; border: 3px solid transparent; text-align: center; font-size: 0.7rem; }
        .tmdb-item.selected { border-color: var(--sub); background: #fff0ee; }
        .tmdb-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        
        .actor-tag { background: white; border: 1px solid #ddd; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin: 2px; }
        .actor-tag.selected { background: var(--main); color: white; border-color: var(--main); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-login" class="screen active">
        <h1>🗄️ 덕질 수납함</h1>
        <div style="max-width:300px; margin: 40px auto; text-align: center;">
            <input type="password" id="adminPassword" placeholder="관리자 비밀번호">
            <button class="btn-main" onclick="login('admin')">관리자로 입장</button>
            <button class="btn-main" style="background:#ddd; color:#444;" onclick="login('guest')">게스트로 입장</button>
        </div>
    </div>

    <div class="tab-menu" id="tab-menu">
        <div class="tab-btn active" onclick="goScreen('screen-main')">HOME</div>
        <div class="tab-btn" onclick="initListPage()">수납함</div>
        <div class="tab-btn" onclick="loadThemes()">테마</div>
    </div>

    <div id="screen-main" class="screen">
        <h1>🗄️ 덕질 수납함</h1>
        <div style="max-width:300px; margin: 40px auto; display:grid; gap:12px;">
            <button class="btn-main" onclick="initListPage()">📂 수납함 열기</button>
            <button class="btn-main admin-only" style="background:var(--sub)" onclick="startAddRecord()">✏️ 신규 입덕 보관</button>
            <button class="btn-main" style="background:#eee; color:#888;" onclick="logout()">로그아웃</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>🎞️ ACTOR INDEX</h2>
            <button class="admin-only" onclick="startAddRecord()" style="background:var(--sub); color:white; padding:6px 15px; font-size:0.8rem;">+ 티켓 추가</button>
        </div>
        <input type="text" id="actorSearchInput" placeholder="배우 또는 작품명 검색..." onkeyup="filterRecords()">
        <div id="actor-index-bar" style="margin-bottom:15px;"></div>
        <div id="record-display" class="record-grid"></div>
    </div>

    <div id="screen-theme-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>🔖 THEME ARCHIVE</h2>
            <button class="btn-main admin-only" onclick="goScreen('screen-theme-write')" style="width:auto; padding:8px 15px; margin:0;">+ 테마 생성</button>
        </div>
        <div id="theme-display-area"></div>
    </div>

    <div id="screen-theme-write" class="screen">
        <h2>테마 편집</h2>
        <input type="text" id="themeNameInput" placeholder="테마 제목">
        <div style="background:#eee; padding:15px; border-radius:10px; margin-bottom:20px;">
            <input type="text" id="themeWorkSearch" placeholder="작품 검색" style="width:70%; display:inline-block;">
            <button onclick="searchTMDB('theme')" style="width:25%; background:#444; color:white;">🔍</button>
            <div id="theme-tmdb-results" class="tmdb-results" style="margin-top:10px;"></div>
            <div id="theme-item-detail" style="display:none; margin-top:10px;">
                <input type="text" id="themeItemTag" placeholder="#태그 입력 후 추가">
                <button class="btn-main" onclick="addWorkToTheme()" style="background:var(--sub)">이 작품 추가</button>
            </div>
        </div>
        <div id="added-items-preview"></div>
        <button class="btn-main" style="background:#2ecc71" onclick="saveTheme()">테마 저장</button>
    </div>

    <div id="screen-actor-search" class="screen">
        <h2>누구에게 입덕했나요?</h2>
        <input type="text" id="actorInput" placeholder="배우 이름">
        <button class="btn-main" onclick="confirmActor()">다음</button>
    </div>

    <div id="screen-work-search" class="screen">
        <h2 id="search-title"></h2>
        <input type="text" id="workSearchInput" placeholder="작품명 검색">
        <button class="btn-main" onclick="searchTMDB('work')">검색</button>
        <div id="tmdb-results" class="tmdb-results"></div>
        <div id="tag-section" style="display:none; margin-top:20px;">
            <div id="tag-pool" style="display:flex; flex-wrap:wrap; gap:8px;">
                <span class="actor-tag" onclick="this.classList.toggle('selected')">#눈빛맛집</span>
                <span class="actor-tag" onclick="this.classList.toggle('selected')">#서사천재</span>
                <span class="actor-tag" onclick="this.classList.toggle('selected')">#비주얼</span>
            </div>
            <button id="saveRecordBtn" class="btn-main" onclick="saveRecord()">수납 완료 ✨</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_PW = "1234"; // 비밀번호 설정
    let db = []; let themes = []; let tempEntry = { actor: '', work: null }; let tempThemeWorks = [];
    let isAdmin = false;

    function login(mode) {
        if(mode === 'admin') {
            const pw = document.getElementById('adminPassword').value;
            if(pw !== ADMIN_PW) return alert("비밀번호 불일치");
            isAdmin = true;
            document.body.classList.add('is-admin');
        }
        document.getElementById('tab-menu').style.display = 'flex';
        goScreen('screen-main');
    }

    function logout() {
        isAdmin = false;
        document.body.classList.remove('is-admin');
        document.getElementById('tab-menu').style.display = 'none';
        goScreen('screen-login');
    }

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        // 탭 활성화 처리
        if(id.includes('list')) document.querySelectorAll('.tab-btn')[1].classList.add('active');
        else if(id.includes('theme')) document.querySelectorAll('.tab-btn')[2].classList.add('active');
        else if(id === 'screen-main') document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }

    async function refreshDB() { 
        try {
            const res = await fetch('/api/proxy?type=records'); 
            db = await res.json(); 
        } catch(e) { console.error("DB 로딩 실패"); }
    }

    async function initListPage() { 
        goScreen('screen-list'); 
        await refreshDB(); 
        renderList(db); 
    }

    function renderList(items) {
        const displayArea = document.getElementById('record-display');
        displayArea.innerHTML = items.map(r => `
            <div class="ticket">
                <img src="${r.poster_url}">
                <div style="padding:15px;">
                    <div style="font-size:0.75rem; color:var(--sub); font-weight:800;">${r.actor}</div>
                    <div style="font-weight:800; margin:5px 0;">${r.work_title}</div>
                    <div class="ticket-tags">${(r.tags||[]).join(' ')}</div>
                    ${isAdmin ? `<button onclick="deleteRecord('${r.id}')" style="color:red; font-size:0.7rem; background:none;">삭제</button>` : ''}
                </div>
            </div>`).join('');
    }

    async function searchTMDB(type) {
        const q = (type === 'work') ? document.getElementById('workSearchInput').value : document.getElementById('themeWorkSearch').value;
        const res = await fetch(`/api/search?query=${encodeURIComponent(q)}`);
        const data = await res.json();
        const area = document.getElementById(type === 'work' ? 'tmdb-results' : 'theme-tmdb-results');
        area.innerHTML = (data.results || []).map(item => {
            const title = (item.title || item.name).replace(/'/g, "");
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            return `<div class="tmdb-item" onclick="selectWork('${title}', '${poster}', this, '${type}')"><img src="${poster}"><p>${title}</p></div>`;
        }).join('');
    }

    function selectWork(title, poster, el, type) {
        tempEntry.work = { title, poster };
        document.querySelectorAll('.tmdb-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById(type === 'work' ? 'tag-section' : 'theme-item-detail').style.display = 'block';
    }

    async function saveRecord() {
        if(!isAdmin) return alert("권한 없음");
        const tags = Array.from(document.querySelectorAll('#tag-pool .selected')).map(el => el.innerText);
        const saveBtn = document.getElementById('saveRecordBtn');
        saveBtn.disabled = true;

        try {
            const payload = { 
                id: Date.now().toString(), 
                actor: tempEntry.actor, 
                work_title: tempEntry.work.title, 
                poster_url: tempEntry.work.poster, 
                tags: tags 
            };
            
            const res = await fetch('/api/proxy?type=records', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload) 
            });

            if(res.ok) {
                alert("수납 완료!");
                initListPage();
            } else { throw new Error(); }
        } catch (e) {
            alert("저장 중 오류가 발생했습니다. RLS 설정을 확인하세요.");
        } finally { saveBtn.disabled = false; }
    }

    async function deleteRecord(id) {
        if(!isAdmin || !confirm("삭제할까요?")) return;
        await fetch(`/api/proxy?type=records&id=${id}`, { method: 'DELETE' });
        initListPage();
    }

    // 테마 저장 등 나머지 로직은 기존과 동일하게 구현하되 isAdmin 체크 추가
    function startAddRecord() { goScreen('screen-actor-search'); }
    function confirmActor() { tempEntry.actor = document.getElementById('actorInput').value; goScreen('screen-work-search'); }
</script>
</body>
</html>
