<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외쳐라! 이 배우 이 작품</title>
    <style>
        :root { --primary: #6c5ce7; --accent: #ff4757; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 1200px; margin: 0 auto; min-height: 100vh; background: white; padding: 40px; box-sizing: border-box; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        button { padding: 16px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-shout { background: var(--primary); color: white; width: 100%; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 1rem; }

        /* 태그 스타일 */
        .tag-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .tag-chip { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 0.9rem; cursor: pointer; background: white; }
        .tag-chip.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* 결과 그리드 */
        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .tmdb-item { border-radius: 12px; overflow: hidden; background: #fff; cursor: pointer; border: 3px solid transparent; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tmdb-item.selected { border-color: var(--accent); }
        .tmdb-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* 워드클라우드형 입덕작 확인 */
        .record-cloud { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 30px; justify-content: center; padding: 40px; min-height: 400px; }
        .cloud-item { position: relative; transition: all 0.3s; text-align: center; }
        .cloud-item img { border-radius: 15px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); border: 4px solid #fff; }
        .cloud-item .badge { position: absolute; top: -15px; right: -15px; background: var(--accent); color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        .theme-card { background: #f1f2f6; padding: 25px; border-radius: 20px; margin-bottom: 25px; }
        .back-link { color: #888; cursor: pointer; text-decoration: underline; margin-bottom: 20px; display: inline-block; font-weight: 500; }
        
        .added-preview-item { display: inline-block; background: #eee; padding: 5px 12px; border-radius: 8px; margin: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-main" class="screen active">
        <h1 style="font-size: 2.5rem; color: #2d3436;">📣 외쳐라!<br>이 배우 이 작품</h1>
        <div style="display: grid; gap: 15px; margin-top: 40px;">
            <button class="btn-shout" onclick="goScreen('screen-actor-search')">입덕작 외치기</button>
            <button style="background:#f1f2f6; color:#2d3436;" onclick="initListPage()">입덕작 확인</button>
            <button style="background:#dfe6e9; color:#2d3436;" onclick="goScreen('screen-theme-list')">📂 테마별 추천작</button>
        </div>
    </div>

    <div id="screen-actor-search" class="screen">
        <span class="back-link" onclick="cancelAndGoHome()">취소하고 홈으로</span>
        <h2>어떤 배우에게 입덕하셨나요?</h2>
        <input type="text" id="actorInput" placeholder="배우 이름을 입력하세요">
        <button class="btn-shout" onclick="confirmActor()">다음으로</button>
    </div>

    <div id="screen-work-search" class="screen">
        <span class="back-link" onclick="goScreen('screen-actor-search')">이전으로</span>
        <h2 id="current-target" style="color: var(--primary);"></h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="workSearchInput" placeholder="작품명 검색">
            <button onclick="searchTMDB('work')" style="white-space:nowrap; height: 53px; background:#2d3436; color:white;">검색</button>
        </div>
        <div id="tmdb-results" class="tmdb-results"></div>
        
        <div id="tag-area" style="display:none; background:#f9f9f9; padding:25px; border-radius:20px; border: 1px solid #eee;">
            <h3>어떤 포인트에 입덕했나요? (최대 2개)</h3>
            <div class="tag-selector" id="tag-selector-work">
                <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                <div class="tag-chip" onclick="toggleTag(this)">#연기천재</div>
                <div class="tag-chip" onclick="toggleTag(this)">#비주얼끝판왕</div>
                <div class="tag-chip" onclick="toggleTag(this)">#케미요정</div>
            </div>
            <div style="display:flex; gap:10px; margin: 20px 0;">
                <input type="text" id="customTagWork" placeholder="직접 입력 (예: 목소리)" style="margin:0; flex:1;">
                <button onclick="addCustomTag('work')" style="padding:0 20px; background:#636e72; color:white; border-radius:12px;">추가</button>
            </div>
            <button class="btn-shout" style="background:var(--accent)" onclick="saveShout()">외치기 완료!</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <span class="back-link" onclick="goScreen('screen-main')">홈으로</span>
        <h2>우리의 입덕 기록</h2>
        <div id="actor-buttons" style="display:flex; gap:12px; margin-bottom:30px; overflow-x:auto; padding-bottom:10px;"></div>
        <div id="record-display" class="record-cloud"></div>
    </div>

    <div id="screen-theme-list" class="screen">
        <span class="back-link" onclick="goScreen('screen-main')">홈으로</span>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>테마별 추천작</h2>
            <button onclick="goScreen('screen-theme-write')" style="background:var(--accent); color:white; padding:10px 20px;">테마 만들기 +</button>
        </div>
        <div id="theme-display-area"></div>
    </div>

    <div id="screen-theme-write" class="screen">
        <span class="back-link" onclick="cancelAndGoHome()">취소</span>
        <h2>새 테마 만들기</h2>
        <input type="text" id="themeNameInput" placeholder="테마 제목을 입력하세요 (예: 비오는 날 생각나는)">
        
        <div style="background:#f8f9fa; padding:25px; border-radius:20px; border:2px dashed #ddd; margin-bottom:20px;">
            <h3 style="margin-top:0;">작품 추가하기</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="themeWorkSearch" placeholder="작품 검색" style="margin:0;">
                <button onclick="searchTMDB('theme')" style="background:#2d3436; color:white; border-radius:12px;">검색</button>
            </div>
            <div id="theme-tmdb-results" class="tmdb-results" style="margin-top:20px;"></div>
            
            <div id="theme-tag-area" style="display:none; border-top: 1px solid #ddd; padding-top:20px;">
                <p>이 작품의 매력 포인트는? (최대 2개)</p>
                <div class="tag-selector" id="tag-selector-theme">
                    <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#연기천재</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#비주얼끝판왕</div>
                </div>
                <button class="btn-shout" onclick="addWorkToTheme()">이 작품을 테마에 추가</button>
            </div>
        </div>

        <div id="temp-added-list" style="margin-bottom:30px;">
            <h4>현재 추가된 작품:</h4>
            <div id="added-items-preview"></div>
        </div>
        
        <button class="btn-shout" style="background:#2ecc71" onclick="saveTheme()">테마 최종 저장하기</button>
    </div>
</div>

<script>
    // Vercel Serverless Function 호출 경로
    const API_ENDPOINT = '/api/search';
    
    let db = JSON.parse(localStorage.getItem('fan_db')) || {}; 
    let themes = JSON.parse(localStorage.getItem('fan_themes')) || [];
    let tempEntry = { actor: '', work: null, tags: [] };
    let tempThemeWorks = [];

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function cancelAndGoHome() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.querySelectorAll('.tag-chip').forEach(t => t.classList.remove('selected'));
        tempThemeWorks = [];
        document.getElementById('added-items-preview').innerHTML = "";
        goScreen('screen-main');
    }

    function confirmActor() {
        const val = document.getElementById('actorInput').value.trim();
        if(!val) return;
        tempEntry.actor = val;
        document.getElementById('current-target').innerText = `✨ ${val} 배우의 입덕작 찾기`;
        goScreen('screen-work-search');
    }

    async function searchTMDB(type) {
        const query = type === 'work' ? document.getElementById('workSearchInput').value : document.getElementById('themeWorkSearch').value;
        if(!query) return;

        // Vercel 서버리스 함수 호출
        const res = await fetch(`${API_ENDPOINT}?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        
        const areaId = type === 'work' ? 'tmdb-results' : 'theme-tmdb-results';
        const area = document.getElementById(areaId);
        area.innerHTML = "";
        
        if(!data.results || data.results.length === 0) {
            area.innerHTML = "<p>결과가 없습니다.</p>";
            return;
        }

        data.results.forEach(item => {
            if(!item.poster_path) return;
            const title = item.title || item.name;
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            const div = document.createElement('div');
            div.className = 'tmdb-item';
            div.innerHTML = `<img src="${poster}"><p style="padding:10px; font-weight:600; font-size:14px;">${title}</p>`;
            div.onclick = () => {
                tempEntry.work = { title, poster };
                document.querySelectorAll(`#${areaId} .tmdb-item`).forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById(type === 'work' ? 'tag-area' : 'theme-tag-area').style.display = 'block';
            };
            area.appendChild(div);
        });
    }

    function toggleTag(el) {
        const parent = el.parentElement;
        if(el.classList.contains('selected')) {
            el.classList.remove('selected');
        } else {
            if(parent.querySelectorAll('.selected').length < 2) el.classList.add('selected');
            else alert("태그는 최대 2개까지만 선택 가능합니다.");
        }
    }

    function addCustomTag(type) {
        const input = document.getElementById(type === 'work' ? 'customTagWork' : 'customTagTheme');
        const val = input.value.trim();
        if(!val) return;
        const container = document.getElementById(type === 'work' ? 'tag-selector-work' : 'tag-selector-theme');
        const newTag = document.createElement('div');
        newTag.className = 'tag-chip selected';
        newTag.innerText = `#${val}`;
        newTag.onclick = () => toggleTag(newTag);
        container.appendChild(newTag);
        input.value = "";
    }

    function saveShout() {
        const selectedTags = Array.from(document.querySelectorAll('#tag-selector-work .selected')).map(t => t.innerText);
        const { actor, work } = tempEntry;
        
        if(!db[actor]) db[actor] = {};
        if(!db[actor][work.title]) db[actor][work.title] = { count: 0, poster: work.poster, tags: [] };
        
        db[actor][work.title].count++;
        db[actor][work.title].tags = [...new Set([...db[actor][work.title].tags, ...selectedTags])];
        
        localStorage.setItem('fan_db', JSON.stringify(db));
        alert("입덕작이 성공적으로 외쳐졌습니다!");
        cancelAndGoHome();
    }

    function addWorkToTheme() {
        const selectedTags = Array.from(document.querySelectorAll('#tag-selector-theme .selected')).map(t => t.innerText);
        if(!tempEntry.work) return;
        
        tempThemeWorks.push({ ...tempEntry.work, tags: selectedTags });
        
        // 입력란 초기화
        document.getElementById('theme-tag-area').style.display = 'none';
        document.getElementById('themeWorkSearch').value = "";
        document.getElementById('theme-tmdb-results').innerHTML = "";
        document.querySelectorAll('#tag-selector-theme .tag-chip').forEach(t => t.classList.remove('selected'));
        
        // 미리보기 목록 업데이트
        const preview = document.getElementById('added-items-preview');
        preview.innerHTML = tempThemeWorks.map(w => `<span class="added-preview-item">${w.title}</span>`).join('');
    }

    function saveTheme() {
        const name = document.getElementById('themeNameInput').value.trim();
        if(!name || tempThemeWorks.length === 0) return alert("테마 이름과 최소 한 개의 작품을 등록하세요!");
        
        themes.push({ name, works: tempThemeWorks });
        localStorage.setItem('fan_themes', JSON.stringify(themes));
        renderThemes();
        alert("새로운 테마가 저장되었습니다.");
        cancelAndGoHome();
    }

    function initListPage() {
        const actors = Object.keys(db);
        const btnArea = document.getElementById('actor-buttons');
        if(actors.length === 0) {
            btnArea.innerHTML = "<p>아직 기록이 없습니다.</p>";
        } else {
            btnArea.innerHTML = actors.map(a => `<button onclick="showActorRecords('${a}')" style="background:white; border:2px solid var(--primary); color:var(--primary); padding:8px 20px;">${a}</button>`).join('');
        }
        goScreen('screen-list');
        if(actors.length > 0) showActorRecords(actors[0]);
    }

    function showActorRecords(actor) {
        const records = db[actor];
        const display = document.getElementById('record-display');
        display.innerHTML = "";

        Object.keys(records).forEach(title => {
            const data = records[title];
            // 횟수에 따른 크기 가변 (최소 160px ~ 최대 400px)
            const size = Math.min(160 + (data.count - 1) * 50, 400);
            const item = document.createElement('div');
            item.className = 'cloud-item';
            item.innerHTML = `
                <div class="badge">${data.count}</div>
                <img src="${data.poster}" style="width:${size}px;">
                <p style="margin-top:10px; font-weight:bold;">${title}</p>
                <div style="font-size:12px; color:var(--primary);">${data.tags.slice(0,3).join(' ')}</div>
            `;
            display.appendChild(item);
        });
    }

    function renderThemes() {
        const area = document.getElementById('theme-display-area');
        if(themes.length === 0) {
            area.innerHTML = "<p style='color:#888;'>등록된 테마가 없습니다. 첫 테마를 만들어보세요!</p>";
            return;
        }
        area.innerHTML = themes.map(t => `
            <div class="theme-card">
                <h3 style="margin-top:0; color:var(--primary);"># ${t.name}</h3>
                <div style="display:flex; gap:15px; overflow-x:auto; padding-bottom:10px;">
                    ${t.works.map(w => `
                        <div style="width:120px; font-size:12px; flex-shrink:0;">
                            <img src="${w.poster}" style="width:100%; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1);">
                            <p style="margin:8px 0 4px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${w.title}</p>
                            <div style="color:#888; font-size:10px;">${w.tags.join(' ')}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    renderThemes();
</script>
</body>
</html>
