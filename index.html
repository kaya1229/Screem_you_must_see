<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕질 수납함</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&family=Nanum+Pen+Script&display=swap');

        :root { 
            --main: #78a2cc; --sub: #e59a8a; --bg: #f4f4f2; --paper: #ffffff; --text: #444; --danger: #e74c3c;
            --handwriting: 'Nanum Pen Script', cursive;
        }

        body { font-family: 'Nanum Square Round', sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }

        .app-container { 
            width: 100%; max-width: 800px; margin: 60px auto; min-height: 85vh; 
            background: var(--paper); padding: 50px 30px; box-sizing: border-box; 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.03); border: 1px solid #ddd; position: relative;
        }

        /* 공통 탭 스타일 */
        .tab-menu { display: flex; gap: 5px; position: absolute; top: -45px; left: 20px; }
        .tab-btn { padding: 12px 25px; background: #d1d1cf; border-radius: 12px 12px 0 0; border: 1px solid #bbb; border-bottom: none; cursor: pointer; font-weight: 700; color: #777; transition: 0.2s; }
        .tab-btn.active { background: var(--paper); color: var(--main); height: 50px; margin-top: -5px; z-index: 2; }

        .screen { display: none; animation: drawerOpen 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes drawerOpen { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; font-size: 2.2rem; color: var(--main); text-align: center; margin-bottom: 40px; }
        h2 { font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }

        button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--main); color: white; width: 100%; }
        .btn-sub { background: var(--sub); color: white; }
        .btn-gray { background: #eee; color: #777; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }

        /* [테마 리스트] 기존 격자형 복구 */
        .theme-card { background: #fffef0; padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #eee; position: relative; }
        .theme-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--main); padding-bottom: 10px; }
        .theme-title { font-size: 1.3rem; font-weight: 800; color: #333; margin: 0; }
        
        /* 기존의 바둑판식 배열 */
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .theme-item { text-align: center; }
        .theme-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); margin-bottom: 8px; background: #eee; }
        .theme-work-name { font-size: 0.8rem; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .theme-work-tags { font-family: var(--handwriting); font-size: 1rem; color: var(--main); display: block; line-height: 1; }

        /* [테마 편집] 미리보기 및 삭제 */
        .preview-box { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        .preview-info b { font-size: 0.9rem; }
        .preview-info span { font-family: var(--handwriting); color: var(--main); margin-left: 10px; }
        .del-x { color: var(--danger); cursor: pointer; font-weight: bold; font-size: 1.1rem; }

        /* 검색 및 태그 */
        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .tmdb-item { border-radius: 8px; overflow: hidden; cursor: pointer; border: 3px solid transparent; text-align: center; font-size: 0.75rem; }
        .tmdb-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .tmdb-item.selected { border-color: var(--sub); }

        .tag-pool { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .tag-chip { padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 0.85rem; cursor: pointer; background: white; }
        .tag-chip.selected { background: var(--main); color: white; border-color: var(--main); }

        /* 수납함 티켓 */
        .record-cloud { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; justify-items: center; }
        .ticket-v { width: 160px; background: #fff; border: 1px solid #eee; border-radius: 10px; overflow: hidden; box-shadow: 5px 5px 15px rgba(0,0,0,0.05); position: relative; }
        .ticket-v-top { width: 100%; aspect-ratio: 2/3; overflow: hidden; position: relative; }
        .ticket-v-top img { width: 100%; height: 100%; object-fit: cover; }
        .ticket-divider { height: 20px; background: #fff; border-top: 2px dashed #eee; position: relative; margin-top: -1px; }
        .ticket-divider::before, .ticket-divider::after { content: ""; position: absolute; top: -10px; width: 20px; height: 20px; background: var(--paper); border: 1px solid #eee; border-radius: 50%; }
        .ticket-divider::before { left: -11px; } .ticket-divider::after { right: -11px; }
        .ticket-v-bottom { padding: 10px 12px 15px; text-align: center; }
        .ticket-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
        .ticket-tags { font-family: var(--handwriting); font-size: 1.1rem; color: var(--main); }
        .ctrl-btns { display: flex; justify-content: center; gap: 10px; margin-top: 10px; border-top: 1px solid #f5f5f5; padding-top: 8px; }
        .ctrl-link { font-size: 0.7rem; color: #999; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tab-menu">
        <div class="tab-btn active" onclick="goScreen('screen-main')">HOME</div>
        <div class="tab-btn" onclick="initListPage()">수납함</div>
        <div class="tab-btn" onclick="loadThemes()">테마</div>
    </div>

    <div id="screen-main" class="screen active">
        <h1>🗄️ 덕질 수납함</h1>
        <div style="max-width:300px; margin: 40px auto; display:grid; gap:12px;">
            <button class="btn-main" onclick="initListPage()">📂 수납함 열기</button>
            <button class="btn-gray" onclick="startShout()">✏️ 새로운 입덕 보관</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>🎞️ ACTOR INDEX</h2>
            <button class="btn-sub" onclick="startShout()" style="padding:8px 15px; font-size:0.8rem;">+ 추가</button>
        </div>
        <div id="actor-index-area" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:25px;"></div>
        <div id="record-display" class="record-cloud"></div>
    </div>

    <div id="screen-actor-search" class="screen">
        <h2>누구에게 입덕했나요?</h2>
        <input type="text" id="actorInput" placeholder="배우 성함">
        <button class="btn-main" onclick="confirmActor()">작품 검색</button>
    </div>

    <div id="screen-work-search" class="screen">
        <h2 id="current-target" style="color:var(--main);"></h2>
        <div id="search-section">
            <div style="display:flex; gap:10px;">
                <input type="text" id="workSearchInput" placeholder="작품명 입력" style="margin:0;">
                <button onclick="searchTMDB('work')" style="background:#444; color:white; width:60px; border-radius:8px;">🔍</button>
            </div>
            <div id="tmdb-results" class="tmdb-results"></div>
        </div>
        <div id="tag-area" style="display:none; margin-top:20px;">
            <div style="padding:20px; border:1px dashed var(--main); border-radius:12px;">
                <p style="font-weight:800; margin-top:0;">입덕 포인트 (최대 3개)</p>
                <div id="tag-pool-work" class="tag-pool">
                    <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#비주얼</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#연기력</div>
                </div>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="customTagInput" placeholder="#직접입력" style="margin:0; padding:10px;">
                    <button class="btn-gray" onclick="addCustomTag()" style="padding:0 15px;">추가</button>
                </div>
            </div>
            <button class="btn-main" style="background:var(--sub); margin-top:20px;" onclick="saveShout()">기록 보관 완료 ✨</button>
        </div>
    </div>

    <div id="screen-theme-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>🔖 THEME ARCHIVE</h2>
            <button class="btn-sub" onclick="openThemeWrite()" style="padding:8px 15px; font-size:0.8rem;">+ 테마 생성</button>
        </div>
        <div id="theme-display-area"></div>
    </div>

    <div id="screen-theme-write" class="screen">
        <h2 id="theme-write-title">테마 편집</h2>
        <input type="hidden" id="editingThemeId">
        <input type="text" id="themeNameInput" placeholder="테마 제목 (예: 눈물 버튼 자극하는)">
        
        <div style="background:#f9f9f9; padding:15px; border-radius:10px; margin-bottom:20px;">
            <p style="font-weight:800; margin-top:0; font-size:0.9rem;">작품 검색 후 추가</p>
            <div style="display:flex; gap:10px;">
                <input type="text" id="themeWorkSearch" placeholder="작품명 검색" style="margin:0;">
                <button onclick="searchTMDB('theme')" style="background:#444; color:white; width:60px;">🔍</button>
            </div>
            <div id="theme-tmdb-results" class="tmdb-results"></div>
            <div id="theme-item-detail" style="display:none; margin-top:15px; background:white; padding:15px; border-radius:8px; border:1px solid #eee;">
                <input type="text" id="themeItemTag" placeholder="#테마용 해시태그">
                <button class="btn-main" onclick="addWorkToTheme()">테마에 이 작품 넣기</button>
            </div>
        </div>

        <p style="font-weight:800; font-size:0.9rem;">현재 담긴 작품 (삭제 가능)</p>
        <div id="added-items-preview"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn-gray" id="themeDelBtn" style="display:none; background:var(--danger); color:white;" onclick="deleteTheme()">테마 전체 삭제</button>
            <button class="btn-main" style="background:#2ecc71" onclick="saveTheme()">테마 저장 완료</button>
        </div>
    </div>
</div>

<script>
    let db = []; let themes = [];
    let tempEntry = { id: null, actor: '', work: null, tags: [] };
    let tempThemeWorks = [];
    let isEditMode = false;
    let currentActor = "";

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab-menu').forEach(btn => btn.classList.remove('active'));
        if(id === 'screen-main') document.querySelectorAll('.tab-btn')[0].classList.add('active');
        if(['screen-list', 'screen-actor-search', 'screen-work-search'].includes(id)) document.querySelectorAll('.tab-btn')[1].classList.add('active');
        if(['screen-theme-list', 'screen-theme-write'].includes(id)) document.querySelectorAll('.tab-btn')[2].classList.add('active');
    }

    async function initListPage() {
        goScreen('screen-list');
        const res = await fetch('/api/proxy?type=records');
        db = await res.json();
        renderActorIndex();
    }

    function renderActorIndex() {
        const area = document.getElementById('actor-index-area');
        const actors = [...new Set(db.map(r => r.actor))].sort((a,b) => a.localeCompare(b,'ko'));
        area.innerHTML = actors.map(name => `<button class="actor-btn ${currentActor===name?'selected':''}" style="background:white; border:1px solid #ddd; padding:6px 15px; border-radius:20px; cursor:pointer;" onclick="showActorRecords('${name}', this)">${name}</button>`).join('');
        
        const selectedBtn = Array.from(area.querySelectorAll('button')).find(b => b.innerText === currentActor);
        if(selectedBtn) showActorRecords(currentActor, selectedBtn);
        else if(actors.length > 0) showActorRecords(actors[0], area.firstChild);
    }

    function showActorRecords(actorName, btnEl) {
        currentActor = actorName;
        document.querySelectorAll('.actor-btn').forEach(b => { b.style.background='white'; b.style.color='#777'; b.style.borderColor='#ddd'; });
        btnEl.style.background = 'var(--main)'; btnEl.style.color = 'white'; btnEl.style.borderColor = 'var(--main)';
        
        const records = db.filter(r => r.actor === actorName);
        const counts = {}; records.forEach(r => counts[r.work_title] = (counts[r.work_title] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);

        document.getElementById('record-display').innerHTML = records.map(r => {
            const rankIndex = sorted.findIndex(w => w[0] === r.work_title);
            const badge = rankIndex < 3 ? `<div class="rank-badge" style="position:absolute; top:10px; right:10px; background:var(--sub); color:white; padding:3px 10px; border-radius:5px; font-size:0.75rem; font-weight:800; z-index:5;">${rankIndex+1}위</div>` : "";
            return `
                <div class="ticket-v">
                    <div class="ticket-v-top">${badge}<img src="${r.poster_url}"></div>
                    <div class="ticket-divider"></div>
                    <div class="ticket-v-bottom">
                        <div class="ticket-title">${r.work_title}</div>
                        <div class="ticket-tags">${(r.tags||[]).join(' ')}</div>
                        <div class="ctrl-btns">
                            <span class="ctrl-link" onclick="openEditMode('${r.id}')">수정</span>
                            <span class="ctrl-link" style="color:var(--danger)" onclick="deleteRecord('${r.id}')">삭제</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    /* 입덕 수납 기능 */
    function startShout() { isEditMode=false; tempEntry={id:null,actor:'',work:null,tags:[]}; document.getElementById('actorInput').value=""; goScreen('screen-actor-search'); }
    function confirmActor() { tempEntry.actor = document.getElementById('actorInput').value.trim(); if(tempEntry.actor) { document.getElementById('current-target').innerText = `✨ ${tempEntry.actor} 님의 기록`; document.getElementById('search-section').style.display='block'; document.getElementById('tag-area').style.display='none'; goScreen('screen-work-search'); } }
    
    async function searchTMDB(type) {
        const query = (type === 'work') ? document.getElementById('workSearchInput').value : document.getElementById('themeWorkSearch').value;
        const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        const area = document.getElementById(type === 'work' ? 'tmdb-results' : 'theme-tmdb-results');
        area.innerHTML = data.results?.map(item => {
            const title = (item.title || item.name).replace(/'/g, "");
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            return `<div class="tmdb-item" onclick="selectWork('${title}', '${poster}', this, '${type}')"><img src="${poster}"><p>${title}</p></div>`;
        }).join('') || "결과 없음";
    }

    function selectWork(title, poster, el, type) {
        tempEntry.work = { title, poster };
        document.querySelectorAll(`#${el.parentElement.id} .tmdb-item`).forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById(type === 'work' ? 'tag-area' : 'theme-item-detail').style.display = 'block';
    }

    function toggleTag(el) { if(el.classList.contains('selected')) el.classList.remove('selected'); else if(el.parentElement.querySelectorAll('.selected').length < 3) el.classList.add('selected'); }
    function addCustomTag() {
        const val = document.getElementById('customTagInput').value.trim(); if(!val) return;
        const tag = val.startsWith('#') ? val : '#' + val;
        document.getElementById('tag-pool-work').innerHTML += `<div class="tag-chip selected" onclick="toggleTag(this)">${tag}</div>`;
        document.getElementById('customTagInput').value = "";
    }

    async function saveShout() {
        const tags = Array.from(document.querySelectorAll('#tag-pool-work .selected')).map(t => t.innerText);
        const payload = { id: tempEntry.id || Date.now().toString(), actor: tempEntry.actor, work_title: isEditMode?tempEntry.work_title:tempEntry.work.title, poster_url: isEditMode?tempEntry.poster_url:tempEntry.work.poster, tags };
        await fetch('/api/proxy?type=records', { method: 'POST', body: JSON.stringify(payload) });
        currentActor = payload.actor; initListPage();
    }

    function openEditMode(id) {
        isEditMode=true; const target=db.find(i=>i.id==id); if(!target) return; tempEntry={...target};
        document.getElementById('current-target').innerText = `✏️ '${target.work_title}' 수정`;
        document.getElementById('search-section').style.display='none'; document.getElementById('tag-area').style.display='block';
        const pool = document.getElementById('tag-pool-work');
        pool.innerHTML = ['#눈빛맛집','#서사천재','#비주얼','#연기력'].map(t => `<div class="tag-chip ${tempEntry.tags.includes(t)?'selected':''}" onclick="toggleTag(this)">${t}</div>`).join('');
        tempEntry.tags.forEach(t => { if(!['#눈빛맛집','#서사천재','#비주얼','#연기력'].includes(t)) pool.innerHTML += `<div class="tag-chip selected" onclick="toggleTag(this)">${t}</div>`; });
        goScreen('screen-work-search');
    }

    async function deleteRecord(id) { if(confirm("이 티켓을 삭제하시겠습니까?")) { await fetch(`/api/proxy?type=records&id=${id}`, { method: 'DELETE' }); initListPage(); } }

    /* [테마] 기존 격자 방식 복구 로직 */
    async function loadThemes() {
        goScreen('screen-theme-list');
        const res = await fetch('/api/proxy?type=themes');
        themes = await res.json();
        document.getElementById('theme-display-area').innerHTML = themes.map(t => `
            <div class="theme-card">
                <div class="theme-header">
                    <h3 class="theme-title"># ${t.name}</h3>
                    <button class="btn-gray" style="padding:5px 12px; font-size:0.75rem;" onclick="editTheme('${t.id}')">편집</button>
                </div>
                <div class="theme-grid">
                    ${t.works.map(w => `
                        <div class="theme-item">
                            <img src="${w.poster}" class="theme-poster">
                            <span class="theme-work-name">${w.title}</span>
                            <span class="theme-work-tags">${w.tags || ""}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function openThemeWrite() {
        tempThemeWorks=[]; document.getElementById('editingThemeId').value="";
        document.getElementById('themeNameInput').value=""; document.getElementById('added-items-preview').innerHTML="";
        document.getElementById('themeDelBtn').style.display='none'; goScreen('screen-theme-write');
    }

    function addWorkToTheme() {
        const tags = document.getElementById('themeItemTag').value.trim();
        tempThemeWorks.push({...tempEntry.work, tags});
        renderThemePreview();
        document.getElementById('themeItemTag').value=""; document.getElementById('theme-item-detail').style.display='none';
    }

    function renderThemePreview() {
        document.getElementById('added-items-preview').innerHTML = tempThemeWorks.map((w, idx) => `
            <div class="preview-box">
                <div class="preview-info"><b>${w.title}</b> <span>${w.tags||""}</span></div>
                <span class="del-x" onclick="tempThemeWorks.splice(${idx},1); renderThemePreview();">✖</span>
            </div>`).join('');
    }

    async function editTheme(id) {
        const target = themes.find(t => t.id == id);
        tempThemeWorks = [...target.works];
        document.getElementById('editingThemeId').value = target.id;
        document.getElementById('themeNameInput').value = target.name;
        document.getElementById('themeDelBtn').style.display='block';
        renderThemePreview(); goScreen('screen-theme-write');
    }

    async function saveTheme() {
        const name = document.getElementById('themeNameInput').value.trim();
        const id = document.getElementById('editingThemeId').value || Date.now().toString();
        if(!name || !tempThemeWorks.length) return alert("제목과 작품을 입력해주세요.");
        await fetch('/api/proxy?type=themes', { method: 'POST', body: JSON.stringify({ id, name, works: tempThemeWorks }) });
        loadThemes();
    }

    async function deleteTheme() {
        if(confirm("테마 전체를 삭제하시겠습니까?")) {
            await fetch(`/api/proxy?type=themes&id=${document.getElementById('editingThemeId').value}`, { method: 'DELETE' });
            loadThemes();
        }
    }
</script>
</body>
</html>
