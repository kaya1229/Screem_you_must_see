<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕질 수납함</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&family=Nanum+Pen+Script&display=swap');

        :root { 
            --main: #78a2cc; --sub: #e59a8a; --bg: #f4f4f2; --paper: #ffffff; --text: #444;
            --handwriting: 'Nanum Pen Script', cursive;
        }

        body { font-family: 'Nanum Square Round', sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }

        .app-container { 
            width: 100%; max-width: 800px; margin: 60px auto; min-height: 85vh; 
            background: var(--paper); padding: 50px 30px; box-sizing: border-box; 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.03); border: 1px solid #ddd; position: relative;
        }

        /* 인덱스 탭 */
        .tab-menu { display: flex; gap: 5px; position: absolute; top: -45px; left: 20px; }
        .tab-btn { 
            padding: 12px 25px; background: #d1d1cf; border-radius: 12px 12px 0 0; 
            border: 1px solid #bbb; border-bottom: none; cursor: pointer; font-weight: 700; color: #777; 
        }
        .tab-btn.active { background: var(--paper); color: var(--main); height: 50px; margin-top: -5px; z-index: 2; }

        .screen { display: none; animation: drawerOpen 0.5s ease-out; }
        .screen.active { display: block; }
        @keyframes drawerOpen { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; font-size: 2.2rem; color: var(--main); text-align: center; margin-bottom: 40px; }
        h2 { font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }

        button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--main); color: white; width: 100%; }
        .btn-sub { background: var(--sub); color: white; }
        .btn-gray { background: #eee; color: #777; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }

        /* --- 세로형 티켓 스타일 카드 --- */
        .record-cloud { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; justify-items: center; }
        .ticket-v {
            width: 160px; background: #fff; border: 1px solid #eee; border-radius: 10px;
            overflow: hidden; box-shadow: 5px 5px 15px rgba(0,0,0,0.05); position: relative;
            display: flex; flex-direction: column; transition: 0.3s;
        }
        .ticket-v:hover { transform: translateY(-5px); }
        
        /* 티켓 상단 (이미지) */
        .ticket-v-top { width: 160px; height: 230px; position: relative; overflow: hidden; }
        .ticket-v-top img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 랭킹 뱃지 */
        .rank-badge {
            position: absolute; top: 10px; right: 10px; background: var(--sub); color: white;
            padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: 800; z-index: 10;
        }

        /* 티켓 절취선 구역 */
        .ticket-divider {
            height: 20px; background: #fff; position: relative;
            border-top: 2px dashed #eee; margin-top: -1px;
        }
        .ticket-divider::before, .ticket-divider::after {
            content: ""; position: absolute; top: -10px; width: 20px; height: 20px;
            background: var(--paper); border: 1px solid #eee; border-radius: 50%;
        }
        .ticket-divider::before { left: -11px; }
        .ticket-divider::after { right: -11px; }

        /* 티켓 하단 (정보) */
        .ticket-v-bottom { padding: 10px 12px 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .ticket-title { font-size: 1rem; font-weight: 800; color: #333; margin-bottom: 5px; line-height: 1.2; }
        .ticket-tags { font-family: var(--handwriting); font-size: 1.2rem; color: var(--main); }
        .edit-link { font-size: 0.7rem; color: #bbb; cursor: pointer; margin-top: 10px; text-decoration: underline; }

        /* 테마 포스터 통일 */
        .theme-card { background: #fffef0; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 8px solid var(--main); }
        .theme-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .theme-poster-box { width: 100px; flex-shrink: 0; text-align: center; }
        .theme-poster-box img { width: 100px; height: 145px; object-fit: cover; border-radius: 6px; }
        .theme-poster-box p { font-size: 0.7rem; font-weight: 700; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .actor-index { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .tag-chip { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 0.85rem; cursor: pointer; background: white; }
        .tag-chip.selected { background: var(--main); color: white; border-color: var(--main); }
        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 15px; }
        .tmdb-item { border-radius: 8px; overflow: hidden; cursor: pointer; border: 3px solid transparent; }
        .tmdb-item.selected { border-color: var(--sub); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tab-menu">
        <div class="tab-btn active" onclick="goScreen('screen-main')">HOME</div>
        <div class="tab-btn" onclick="initListPage()">수납함</div>
        <div class="tab-btn" onclick="loadThemes()">테마</div>
    </div>

    <div id="screen-main" class="screen active">
        <h1>🗄️ 덕질 수납함</h1>
        <p style="text-align:center; font-family:var(--handwriting); font-size:1.6rem; color:#888; margin-top:-30px;">당신의 애정을 세로형 티켓으로 수집하세요</p>
        <div style="max-width:300px; margin: 40px auto; display:grid; gap:12px;">
            <button class="btn-main" onclick="initListPage()">📂 수납함 열기</button>
            <button class="btn-gray" onclick="startShout()">✏️ 새로운 입덕 보관</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>🎞️ ACTOR INDEX</h2>
            <button class="btn-sub" onclick="startShout()" style="padding:8px 15px; font-size:0.8rem;">+ 추가</button>
        </div>
        <div id="actor-index-area" class="actor-index"></div>
        <div id="record-display" class="record-cloud"></div>
    </div>

    <div id="screen-actor-search" class="screen">
        <h2 id="input-title">누구에게 입덕했나요?</h2>
        <input type="text" id="actorInput" placeholder="배우 이름 입력">
        <button class="btn-main" onclick="confirmActor()">다음으로</button>
    </div>

    <div id="screen-work-search" class="screen">
        <h2 id="current-target" style="color:var(--main);"></h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="workSearchInput" placeholder="작품명 검색" style="margin:0;">
            <button onclick="searchTMDB('work')" style="background:var(--text); color:white; width:60px; border-radius:8px;">🔍</button>
        </div>
        <div id="tmdb-results" class="tmdb-results"></div>
        <div id="tag-area" style="display:none; padding:20px; border:1px dashed var(--main); margin-top:20px; border-radius:12px;">
            <p style="font-weight:800; margin:0 0 15px 0;">입덕 포인트 (최대 2개)</p>
            <div id="tag-selector-work" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;">
                <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                <div class="tag-chip" onclick="toggleTag(this)">#비주얼</div>
                <div class="tag-chip" onclick="toggleTag(this)">#연기력</div>
            </div>
            <button class="btn-main" style="background:var(--sub)" onclick="saveShout()">보관하기 ✨</button>
        </div>
    </div>

    <div id="screen-theme-list" class="screen">
        <h2>🔖 THEME ARCHIVE</h2>
        <div id="theme-display-area"></div>
    </div>
</div>

<script>
    let db = []; 
    let tempEntry = { id: null, actor: '', work: null, tags: [] };

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(id === 'screen-main') document.querySelectorAll('.tab-btn')[0].classList.add('active');
        if(['screen-list', 'screen-actor-search', 'screen-work-search'].includes(id)) document.querySelectorAll('.tab-btn')[1].classList.add('active');
        if(id === 'screen-theme-list') document.querySelectorAll('.tab-btn')[2].classList.add('active');
    }

    async function initListPage() {
        goScreen('screen-list');
        try {
            const res = await fetch('/api/proxy?type=records');
            db = await res.json();
            renderActorIndex();
        } catch (e) { console.error(e); }
    }

    function renderActorIndex() {
        const area = document.getElementById('actor-index-area');
        const actors = [...new Set(db.map(item => item.actor))].sort((a, b) => a.localeCompare(b, 'ko'));
        area.innerHTML = actors.map(name => `
            <button onclick="showActorRecords('${name}')" style="background:white; border:1px solid #ddd; padding:6px 15px; font-size:0.85rem; border-radius:20px;">${name}</button>
        `).join('');
        if(actors.length > 0) showActorRecords(actors[0]);
    }

    function showActorRecords(actorName) {
        const records = db.filter(r => r.actor === actorName);
        const counts = {};
        records.forEach(r => counts[r.work_title] = (counts[r.work_title] || 0) + 1);
        const sortedWorks = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        
        const display = document.getElementById('record-display');
        display.innerHTML = "";

        const uniqueWorks = [];
        const seen = new Set();
        records.forEach(r => {
            if(!seen.has(r.work_title)) { uniqueWorks.push(r); seen.add(r.work_title); }
        });

        uniqueWorks.forEach(r => {
            const rankIndex = sortedWorks.findIndex(w => w[0] === r.work_title);
            let rankBadge = (rankIndex < 3) ? `<div class="rank-badge">${rankIndex + 1}위</div>` : "";

            display.innerHTML += `
                <div class="ticket-v">
                    <div class="ticket-v-top">
                        ${rankBadge}
                        <img src="${r.poster_url}">
                    </div>
                    <div class="ticket-divider"></div>
                    <div class="ticket-v-bottom">
                        <div>
                            <div class="ticket-title">${r.work_title}</div>
                            <div class="ticket-tags">${(r.tags || []).join(' ')}</div>
                        </div>
                        <div class="edit-link" onclick="editRecord('${r.id}')">정보 수정</div>
                    </div>
                </div>`;
        });
    }

    function startShout() { 
        tempEntry = { id: null, actor: '', work: null, tags: [] };
        document.getElementById('input-title').innerText = "누구에게 입덕했나요?";
        document.getElementById('actorInput').value = "";
        goScreen('screen-actor-search'); 
    }

    function editRecord(id) {
        const target = db.find(item => item.id == id);
        if(!target) return;
        tempEntry = { ...target };
        document.getElementById('input-title').innerText = "기록 수정";
        document.getElementById('actorInput').value = target.actor;
        goScreen('screen-actor-search');
    }

    function confirmActor() {
        tempEntry.actor = document.getElementById('actorInput').value.trim();
        if(!tempEntry.actor) return;
        document.getElementById('current-target').innerText = `✨ ${tempEntry.actor} 님의 기록`;
        goScreen('screen-work-search');
    }

    async function searchTMDB(type) {
        const query = document.getElementById('workSearchInput').value;
        const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        const area = document.getElementById('tmdb-results');
        area.innerHTML = "";
        data.results?.forEach(item => {
            const title = item.title || item.name;
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            const div = document.createElement('div');
            div.className = 'tmdb-item';
            div.innerHTML = `<img src="${poster}"><p style="font-size:0.7rem; text-align:center; padding:5px;">${title}</p>`;
            div.onclick = () => {
                tempEntry.work = { title, poster };
                document.querySelectorAll('.tmdb-item').forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('tag-area').style.display = 'block';
            };
            area.appendChild(div);
        });
    }

    function toggleTag(el) {
        const selected = el.parentElement.querySelectorAll('.selected');
        if(el.classList.contains('selected')) el.classList.remove('selected');
        else if(selected.length < 2) el.classList.add('selected');
    }

    async function saveShout() {
        const tags = Array.from(document.querySelectorAll('#tag-selector-work .selected')).map(t => t.innerText);
        const payload = { 
            id: tempEntry.id || Date.now(),
            actor: tempEntry.actor, 
            work_title: tempEntry.work.title, 
            poster_url: tempEntry.work.poster, 
            tags 
        };
        const res = await fetch('/api/proxy?type=records', { method: 'POST', body: JSON.stringify(payload) });
        if(res.ok) { alert("수납함에 잘 보관되었습니다!"); initListPage(); }
    }

    async function loadThemes() {
        goScreen('screen-theme-list');
        const res = await fetch('/api/proxy?type=themes');
        const themes = await res.json();
        const area = document.getElementById('theme-display-area');
        area.innerHTML = themes.map(t => `
            <div class="theme-card">
                <h3 style="margin:0 0 15px 0; color:var(--main);"># ${t.name}</h3>
                <div class="theme-scroll">
                    ${t.works.map(w => `
                        <div class="theme-poster-box">
                            <img src="${w.poster}">
                            <p>${w.title}</p>
                        </div>
                    `).join('')}
                </div>
            </div>`).join('');
    }
</script>
</body>
</html>
