<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕크의 수납함</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&family=Nanum+Pen+Script&display=swap');

        :root { 
            --main: #78a2cc; /* 차분한 수납함 블루 */
            --sub: #e59a8a;  /* 바랜 코랄/서류봉투 색 */
            --bg: #f4f4f2;   /* 아카이브실 배경색 */
            --paper: #ffffff; 
            --text: #444;
            --handwriting: 'Nanum Pen Script', cursive;
        }

        body { 
            font-family: 'Nanum Square Round', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            line-height: 1.6; 
        }

        /* 전체 컨테이너를 서류첩처럼 디자인 */
        .app-container { 
            width: 100%; 
            max-width: 800px; 
            margin: 40px auto; 
            min-height: 90vh; 
            background: var(--paper); 
            padding: 50px 30px; 
            box-sizing: border-box; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05); /* 아날로그적인 딱딱한 그림자 */
            border: 1px solid #ddd;
            position: relative;
        }

        /* 상단 인덱스 탭 디자인 */
        .tab-menu {
            display: flex;
            gap: 5px;
            position: absolute;
            top: -40px;
            left: 20px;
        }
        .tab-btn {
            padding: 10px 25px;
            background: #d1d1cf;
            border-radius: 12px 12px 0 0;
            border: 1px solid #bbb;
            border-bottom: none;
            cursor: pointer;
            font-weight: 700;
            color: #666;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--paper);
            color: var(--main);
            height: 45px;
            margin-top: -5px;
            z-index: 2;
        }

        .screen { display: none; animation: drawerOpen 0.5s ease-out; }
        .screen.active { display: block; }

        @keyframes drawerOpen { 
            from { opacity: 0; transform: translateY(20px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        h1 { font-weight: 800; font-size: 2.2rem; color: var(--main); text-align: center; margin-bottom: 40px; letter-spacing: -1px; }
        h2 { font-weight: 800; font-size: 1.5rem; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        button { padding: 15px 25px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Nanum Square Round'; }
        .btn-main { background: var(--main); color: white; width: 100%; }
        .btn-sub { background: var(--sub); color: white; }
        .btn-gray { background: #eee; color: #777; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }

        /* 폴라로이드 스타일의 기록 카드 */
        .record-cloud { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; padding: 20px 0; }
        .cloud-item { 
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            position: relative;
            transition: 0.3s;
            text-align: center;
        }
        .cloud-item:nth-child(even) { transform: rotate(1.5deg); }
        .cloud-item:nth-child(odd) { transform: rotate(-1.5deg); }
        .cloud-item img { display: block; margin-bottom: 15px; border: 1px solid #f9f9f9; }
        .cloud-item .badge { 
            position: absolute; top: -10px; right: -10px; 
            background: var(--sub); color: white; border-radius: 50%; 
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; 
            font-weight: 800; border: 3px solid white; z-index: 10; 
        }
        .cloud-item .handwriting { font-family: var(--handwriting); font-size: 1.4rem; color: #555; }

        /* 티켓 스타일의 테마 카드 */
        .theme-card { 
            background: #fffef0; /* 오래된 종이색 */
            padding: 25px; 
            border-radius: 15px; 
            margin-bottom: 25px; 
            border-left: 8px solid var(--main); 
            position: relative; 
            border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.02);
        }
        .theme-card::after { /* 티켓 절취선 원형 홈 */
            content: ""; position: absolute; left: -14px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; background: var(--paper); border-radius: 50%; border: 1px solid #eee;
        }

        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .tmdb-item { border-radius: 10px; overflow: hidden; background: white; cursor: pointer; border: 3px solid transparent; }
        .tmdb-item.selected { border-color: var(--sub); }
        .tmdb-item img { width: 100%; display: block; }

        .tag-chip { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 0.85rem; cursor: pointer; background: white; }
        .tag-chip.selected { background: var(--main); color: white; border-color: var(--main); }
        .horizontal-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tab-menu">
        <div class="tab-btn active" onclick="goScreen('screen-main')">홈</div>
        <div class="tab-btn" onclick="initListPage()">입덕 수납함</div>
        <div class="tab-btn" onclick="loadThemes()">추천 목록</div>
    </div>

    <div id="screen-main" class="screen active">
        <h1>📦 덕크의 수납함</h1>
        <p style="text-align: center; color: #888; margin-top: -30px; margin-bottom: 40px;">당신의 소중한 덕질 기록을 차곡차곡</p>
        <div style="display: grid; gap: 15px; max-width: 320px; margin: 0 auto;">
            <button class="btn-main" onclick="initListPage()">📂 기록 확인하기</button>
            <button class="btn-gray" onclick="startShout()">✏️ 새로 기록하기</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>🎞️ 나의 입덕 컬렉션</h2>
            <button class="btn-sub" onclick="startShout()" style="padding: 10px 15px;">추가 +</button>
        </div>
        <div id="actor-buttons" class="horizontal-scroll" style="margin-bottom: 20px;"></div>
        <div id="record-display" class="record-cloud"></div>
    </div>

    <div id="screen-actor-search" class="screen">
        <h2>누구에게 입덕했나요?</h2>
        <input type="text" id="actorInput" placeholder="배우/아티스트 이름 입력">
        <button class="btn-main" onclick="confirmActor()">다음 서류로</button>
    </div>

    <div id="screen-work-search" class="screen">
        <h2 id="current-target" style="color: var(--main);"></h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="workSearchInput" placeholder="작품명 검색" style="margin:0;">
            <button onclick="searchTMDB('work')" style="background:var(--text); color:white; width:60px;">🔍</button>
        </div>
        <div id="tmdb-results" class="tmdb-results" style="margin-top:20px;"></div>
        
        <div id="tag-area" style="display:none; background:#fdfdfd; padding:20px; border:1px dashed var(--main); margin-top:20px; border-radius:10px;">
            <p style="font-weight: 800;">어떤 포인트에 반했나요? (최대 2개)</p>
            <div class="tag-selector" id="tag-selector-work" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;">
                <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                <div class="tag-chip" onclick="toggleTag(this)">#비주얼</div>
                <div class="tag-chip" onclick="toggleTag(this)">#연기력</div>
            </div>
            <button class="btn-main" style="background:var(--sub)" onclick="saveShout()">수납함에 저장 ✨</button>
        </div>
    </div>

    <div id="screen-theme-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>🔖 테마별 기록장</h2>
            <button onclick="openThemeWrite()" class="btn-sub" style="padding:10px 20px;">새 테마</button>
        </div>
        <div id="theme-display-area"></div>
    </div>

    <div id="screen-theme-write" class="screen">
        <h2 id="theme-write-title">새 테마 만들기</h2>
        <input type="hidden" id="editingThemeId" value="">
        <input type="text" id="themeNameInput" placeholder="테마 제목 (예: 우울할 때 치료제)">
        <div style="background:#f9f9f9; padding:20px; border-radius:10px; margin-bottom:20px;">
            <div style="display:flex; gap:10px;">
                <input type="text" id="themeWorkSearch" placeholder="작품 검색" style="margin:0;">
                <button onclick="searchTMDB('theme')" style="background:var(--text); color:white; width:60px;">🔍</button>
            </div>
            <div id="theme-tmdb-results" class="tmdb-results" style="margin-top:15px;"></div>
            <div id="theme-tag-area" style="display:none; margin-top:15px;">
                <button class="btn-main" onclick="addWorkToTheme()">이 작품을 테마에 추가</button>
            </div>
        </div>
        <div id="added-items-preview" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;"></div>
        <button class="btn-main" style="background:#2ecc71" onclick="saveTheme()">테마 수납 완료</button>
    </div>
</div>

<script>
    let db = {}; 
    let themes = [];
    let tempEntry = { actor: '', work: null, tags: [] };
    let tempThemeWorks = [];

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // 탭 활성화 UI 처리
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(id === 'screen-main') document.querySelectorAll('.tab-btn')[0].classList.add('active');
        if(id === 'screen-list') document.querySelectorAll('.tab-btn')[1].classList.add('active');
        if(id === 'screen-theme-list') document.querySelectorAll('.tab-btn')[2].classList.add('active');
        window.scrollTo(0,0);
    }

    function resetInputs() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.querySelectorAll('.tmdb-results').forEach(r => r.innerHTML = "");
        document.querySelectorAll('.tag-chip').forEach(t => t.classList.remove('selected'));
        if(document.getElementById('tag-area')) document.getElementById('tag-area').style.display = 'none';
        if(document.getElementById('theme-tag-area')) document.getElementById('theme-tag-area').style.display = 'none';
    }

    // --- API 통신 (우리가 이전에 정리한 구조 기준) ---
    async function initListPage() {
        goScreen('screen-list');
        try {
            const res = await fetch('/api/load'); // proxy 대신 load.js 사용 권장
            const data = await res.json();
            db = {};
            data.forEach(r => {
                if(!db[r.actor]) db[r.actor] = {};
                if(!db[r.actor][r.work_title]) {
                    db[r.actor][r.work_title] = { count: 1, poster: r.poster_url, tags: r.tags || [] };
                } else {
                    db[r.actor][r.work_title].count++;
                }
            });
            renderActorButtons();
            const actors = Object.keys(db);
            if(actors.length > 0) showActorRecords(actors[0]);
        } catch (e) { console.error(e); }
    }

    async function saveShout() {
        const tags = Array.from(document.querySelectorAll('#tag-selector-work .selected')).map(t => t.innerText);
        const payload = { actor: tempEntry.actor, work_title: tempEntry.work.title, poster_url: tempEntry.work.poster, tags };
        
        const res = await fetch('/api/save', { // save.js 사용 권장
            method: 'POST',
            body: JSON.stringify(payload)
        });
        if(res.ok) { alert("기록이 수납되었습니다! 📦"); initListPage(); }
    }

    async function loadThemes() {
        goScreen('screen-theme-list');
        const res = await fetch('/api/load-themes'); // 테마 로드 API
        themes = await res.json();
        renderThemes();
    }

    // --- 검색 및 UI 제어 ---
    function startShout() { resetInputs(); goScreen('screen-actor-search'); }
    function confirmActor() {
        const val = document.getElementById('actorInput').value.trim();
        if(!val) return;
        tempEntry.actor = val;
        document.getElementById('current-target').innerText = `✨ ${val} 배우님 기록`;
        goScreen('screen-work-search');
    }

    async function searchTMDB(type) {
        const query = type === 'work' ? document.getElementById('workSearchInput').value : document.getElementById('themeWorkSearch').value;
        const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        const areaId = type === 'work' ? 'tmdb-results' : 'theme-tmdb-results';
        const area = document.getElementById(areaId);
        area.innerHTML = "";
        data.results?.forEach(item => {
            if(!item.poster_path) return;
            const title = item.title || item.name;
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            const div = document.createElement('div');
            div.className = 'tmdb-item';
            div.innerHTML = `<img src="${poster}"><p style="font-size:0.8rem; padding:5px; text-align:center;">${title}</p>`;
            div.onclick = () => {
                tempEntry.work = { title, poster };
                document.querySelectorAll(`#${areaId} .tmdb-item`).forEach(i => i.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById(type === 'work' ? 'tag-area' : 'theme-tag-area').style.display = 'block';
            };
            area.appendChild(div);
        });
    }

    function toggleTag(el) {
        const selected = el.parentElement.querySelectorAll('.selected');
        if(el.classList.contains('selected')) el.classList.remove('selected');
        else if(selected.length < 2) el.classList.add('selected');
    }

    function renderActorButtons() {
        const actors = Object.keys(db);
        document.getElementById('actor-buttons').innerHTML = actors.map(a => `<button onclick="showActorRecords('${a}')" style="background:white; border:1px solid var(--main); color:var(--main); white-space:nowrap; padding: 8px 15px;">${a}</button>`).join('');
    }

    function showActorRecords(actor) {
        const records = db[actor];
        const display = document.getElementById('record-display');
        display.innerHTML = "";
        Object.keys(records).forEach(title => {
            const data = records[title];
            const size = Math.min(150 + (data.count - 1) * 30, 250);
            display.innerHTML += `
                <div class="cloud-item">
                    <div class="badge">${data.count}</div>
                    <img src="${data.poster}" style="width:${size}px;">
                    <div class="handwriting">${title}</div>
                    <div style="font-size:0.75rem; color:var(--main);">${data.tags.join(' ')}</div>
                </div>`;
        });
    }

    function renderThemes() {
        const area = document.getElementById('theme-display-area');
        area.innerHTML = themes.map(t => `
            <div class="theme-card">
                <h3 style="margin-top:0; color:var(--main);"># ${t.name}</h3>
                <div class="horizontal-scroll">
                    ${t.works.map(w => `<div style="width:90px; flex-shrink:0;"><img src="${w.poster}" style="width:100%; border-radius:5px;"><p style="font-size:0.7rem; font-weight:800;">${w.title}</p></div>`).join('')}
                </div>
            </div>`).join('');
    }

    function openThemeWrite() { resetInputs(); tempThemeWorks = []; goScreen('screen-theme-write'); }
    function addWorkToTheme() {
        tempThemeWorks.push({ ...tempEntry.work });
        document.getElementById('added-items-preview').innerHTML = tempThemeWorks.map((w, idx) => `<span style="background:#eee; padding:5px 10px; border-radius:5px; font-size:0.8rem;">${w.title}</span>`).join('');
    }
</script>
</body>
</html>
