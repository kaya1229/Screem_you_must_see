<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕질 수납함</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&family=Nanum+Pen+Script&display=swap');
        :root { --main: #78a2cc; --sub: #e59a8a; --bg: #f4f4f2; --paper: #ffffff; --text: #444; --danger: #e74c3c; --handwriting: 'Nanum Pen Script', cursive; }
        body { font-family: 'Nanum Square Round', sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }
        .app-container { width: 100%; max-width: 850px; margin: 60px auto; min-height: 85vh; background: var(--paper); padding: 50px 30px; box-sizing: border-box; box-shadow: 15px 15px 0px rgba(0,0,0,0.03); border: 1px solid #ddd; position: relative; }
        
        .tab-menu { display: flex; gap: 5px; position: absolute; top: -45px; left: 20px; }
        .tab-btn { padding: 12px 25px; background: #d1d1cf; border-radius: 12px 12px 0 0; border: 1px solid #bbb; border-bottom: none; cursor: pointer; font-weight: 700; color: #777; }
        .tab-btn.active { background: var(--paper); color: var(--main); height: 50px; margin-top: -5px; z-index: 2; }

        .screen { display: none; animation: drawerOpen 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes drawerOpen { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; font-size: 2.2rem; color: var(--main); text-align: center; margin-bottom: 40px; }
        h2 { font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn-main { background: var(--main); color: white; width: 100%; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-bar { border: 2px solid var(--main); border-radius: 30px; margin-bottom: 15px; }
        .actor-tag { background: white; border: 1px solid #ddd; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin: 2px; }
        .actor-tag.selected { background: var(--main); color: white; border-color: var(--main); }
        
        .record-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; margin-top: 20px; }
        .ticket { background: #fff; border: 1px solid #eee; border-radius: 10px; overflow: hidden; box-shadow: 5px 5px 15px rgba(0,0,0,0.05); text-align: center; }
        .ticket img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-bottom: 2px dashed #eee; }
        .ticket-tags { font-family: var(--handwriting); font-size: 1.1rem; color: var(--main); margin: 5px 0; min-height: 1.2em; }

        .theme-card { background: #fffef0; padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #eee; }
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }
        .theme-poster-box { text-align: center; }
        .theme-poster-box img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); }
        .theme-work-tags { font-family: var(--handwriting); font-size: 1rem; color: var(--main); }

        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .tmdb-item { cursor: pointer; border-radius: 8px; overflow: hidden; border: 3px solid transparent; text-align: center; font-size: 0.7rem; }
        .tmdb-item.selected { border-color: var(--sub); }
        .tmdb-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .preview-box { display: flex; justify-content: space-between; padding: 10px; background: #f9f9f9; border-radius: 8px; margin-bottom: 5px; }
        
        .tag-input-style { border: none; border-bottom: 2px solid var(--main); border-radius: 0; padding: 5px; margin: 0; width: 150px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tab-menu">
        <div class="tab-btn active" onclick="goScreen('screen-main')">HOME</div>
        <div class="tab-btn" onclick="initListPage()">수납함</div>
        <div class="tab-btn" onclick="loadThemes()">테마</div>
    </div>

    <div id="screen-main" class="screen active">
        <h1>🗄️ 덕질 수납함</h1>
        <div style="max-width:300px; margin: 40px auto; display:grid; gap:12px;">
            <button class="btn-main" onclick="initListPage()">📂 수납함 열기</button>
            <button class="btn-main" style="background:var(--sub)" onclick="startAddRecord()">✏️ 신규 입덕 보관</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <div class="list-header">
            <h2 style="border:none; margin:0;">🎞️ ACTOR INDEX</h2>
            <button onclick="startAddRecord()" style="background:var(--sub); color:white; padding:6px 15px; font-size:0.8rem;">+ 티켓 추가</button>
        </div>
        <input type="text" id="actorSearchInput" class="search-bar" placeholder="배우 또는 작품명 검색..." onkeyup="filterRecords()">
        <div id="actor-index-bar"></div>
        <div id="record-display" class="record-grid"></div>
    </div>

    <div id="screen-theme-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>🔖 THEME ARCHIVE</h2>
            <button class="btn-main" onclick="openThemeWrite()" style="width:auto; padding:8px 15px; margin:0;">+ 테마 생성</button>
        </div>
        <div id="theme-display-area"></div>
    </div>

    <div id="screen-theme-write" class="screen">
        <h2>테마 편집</h2>
        <input type="hidden" id="editingThemeId"><input type="text" id="themeNameInput" placeholder="테마 제목">
        <div style="background:#f4f4f2; padding:15px; border-radius:10px; margin-bottom:20px;">
            <div style="display:flex; gap:10px;">
                <input type="text" id="themeWorkSearch" placeholder="작품 검색" style="margin:0;">
                <button onclick="searchTMDB('theme')" style="background:#444; color:white; border:none; padding:0 15px; border-radius:8px;">🔍</button>
            </div>
            <div id="theme-tmdb-results" class="tmdb-results" style="margin-top:10px;"></div>
            <div id="theme-item-detail" style="display:none; margin-top:10px;">
                <input type="text" id="themeItemTag" placeholder="#테마용 태그 (엔터로 추가)" onkeypress="if(event.keyCode==13) addWorkToTheme()">
                <button class="btn-main" onclick="addWorkToTheme()" style="background:var(--sub)">테마에 추가</button>
            </div>
        </div>
        <div id="added-items-preview"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <button class="btn-main" style="background:var(--danger)" onclick="deleteTheme()">테마 삭제</button>
            <button class="btn-main" style="background:#2ecc71" onclick="saveTheme()">테마 저장</button>
        </div>
    </div>

    <div id="screen-actor-search" class="screen">
        <h2>입덕 배우 이름</h2>
        <input type="text" id="actorInput" placeholder="이름을 입력하세요">
        <button class="btn-main" onclick="confirmActor()">다음</button>
    </div>

    <div id="screen-work-search" class="screen">
        <h2 id="search-title"></h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="workSearchInput" placeholder="작품명 검색">
            <button onclick="searchTMDB('work')" style="background:#444; color:white; border-radius:8px; border:none; padding:0 15px;">🔍</button>
        </div>
        <div id="tmdb-results" class="tmdb-results"></div>
        <div id="tag-section" style="display:none; margin-top:20px;">
            <p style="font-weight:800; margin-bottom:10px;">입덕 포인트 (직접 입력 후 엔터)</p>
            <div id="tag-pool" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;">
                <span class="actor-tag" onclick="this.classList.toggle('selected')">#눈빛맛집</span>
                <span class="actor-tag" onclick="this.classList.toggle('selected')">#서사천재</span>
                <span class="actor-tag" onclick="this.classList.toggle('selected')">#비주얼</span>
                <span class="actor-tag" onclick="this.classList.toggle('selected')">#연기력</span>
                <input type="text" id="customTagInput" class="tag-input-style" placeholder="#직접입력" onkeypress="handleCustomTag(event)">
            </div>
            <button class="btn-main" onclick="saveRecord()">수납 완료</button>
        </div>
    </div>
</div>

<script>
    let db = []; let themes = []; let tempEntry = { actor: '', work: null }; let tempThemeWorks = [];

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(['screen-list', 'screen-actor-search', 'screen-work-search'].includes(id)) document.querySelectorAll('.tab-btn')[1].classList.add('active');
        if(['screen-theme-list', 'screen-theme-write'].includes(id)) document.querySelectorAll('.tab-btn')[2].classList.add('active');
        if(id === 'screen-main') document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }

    async function refreshDB() { const res = await fetch('/api/proxy?type=records'); db = await res.json(); }
    async function initListPage() { goScreen('screen-list'); await refreshDB(); renderList(db); }

    function renderList(items) {
        const indexArea = document.getElementById('actor-index-bar');
        const displayArea = document.getElementById('record-display');
        const allActors = [...new Set(db.map(r => r.actor))];
        indexArea.innerHTML = allActors.map(name => `<span class="actor-tag" onclick="setSearch('${name}')">${name}</span>`).join('');
        displayArea.innerHTML = items.map(r => `
            <div class="ticket">
                <img src="${r.poster_url}">
                <div style="padding:15px;">
                    <div style="font-size:0.75rem; color:var(--sub); font-weight:800;">${r.actor}</div>
                    <div style="font-weight:800; margin:5px 0; height:2.4em; overflow:hidden; line-height:1.2;">${r.work_title}</div>
                    <div class="ticket-tags">${(r.tags||[]).join(' ')}</div>
                    <button onclick="deleteRecord('${r.id}')" style="background:none; border:none; color:var(--danger); text-decoration:underline; font-size:0.7rem; cursor:pointer;">삭제</button>
                </div>
            </div>`).join('');
    }

    function filterRecords() {
        const q = document.getElementById('actorSearchInput').value.toLowerCase();
        renderList(db.filter(r => r.actor.toLowerCase().includes(q) || r.work_title.toLowerCase().includes(q)));
    }
    function setSearch(name) { document.getElementById('actorSearchInput').value = name; filterRecords(); }

    function handleCustomTag(e) {
        if(e.keyCode === 13) {
            const val = e.target.value.trim();
            if(!val) return;
            const tag = document.createElement('span');
            tag.className = 'actor-tag selected';
            tag.innerText = val.startsWith('#') ? val : '#' + val;
            tag.onclick = function() { this.remove(); };
            document.getElementById('tag-pool').insertBefore(tag, e.target);
            e.target.value = '';
        }
    }

    function startAddRecord() {
        document.getElementById('actorInput').value = "";
        document.getElementById('workSearchInput').value = "";
        document.getElementById('tmdb-results').innerHTML = "";
        document.getElementById('tag-section').style.display = "none";
        goScreen('screen-actor-search');
    }

    async function deleteRecord(id) {
        if(!confirm("기록을 삭제할까요?")) return;
        await fetch(`/api/proxy?type=records&id=${id}`, { method: 'DELETE' });
        await refreshDB(); renderList(db);
    }

    async function searchTMDB(type) {
        const q = (type === 'work') ? document.getElementById('workSearchInput').value : document.getElementById('themeWorkSearch').value;
        const res = await fetch(`/api/search?query=${encodeURIComponent(q)}`); const data = await res.json();
        const area = document.getElementById(type === 'work' ? 'tmdb-results' : 'theme-tmdb-results');
        area.innerHTML = data.results?.map(item => {
            const title = (item.title || item.name).replace(/'/g, "");
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            return `<div class="tmdb-item" onclick="selectWork('${title}', '${poster}', this, '${type}')"><img src="${poster}"><p>${title}</p></div>`;
        }).join('');
    }

    function selectWork(title, poster, el, type) {
        tempEntry.work = { title, poster };
        document.querySelectorAll(`#${el.parentElement.id} .tmdb-item`).forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById(type === 'work' ? 'tag-section' : 'theme-item-detail').style.display = 'block';
    }

    /* --- 테마 로직 --- */
    function addWorkToTheme() {
        const tagVal = document.getElementById('themeItemTag').value.trim();
        const tags = tagVal ? (tagVal.startsWith('#') ? tagVal : '#' + tagVal) : "";
        tempThemeWorks.push({...tempEntry.work, tags});
        renderThemePreview(); document.getElementById('themeItemTag').value = "";
    }

    function renderThemePreview() {
        document.getElementById('added-items-preview').innerHTML = tempThemeWorks.map((w, i) => `
            <div class="preview-box">
                <span><b>${w.title}</b> <small>${w.tags||""}</small></span>
                <span style="color:var(--danger); cursor:pointer;" onclick="tempThemeWorks.splice(${i},1); renderThemePreview();">✖</span>
            </div>`).join('');
    }

    async function loadThemes() {
        goScreen('screen-theme-list');
        const res = await fetch('/api/proxy?type=themes'); themes = await res.json();
        document.getElementById('theme-display-area').innerHTML = themes.map(t => `
            <div class="theme-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:2px solid var(--main);">
                    <h3 style="margin:0;"># ${t.name}</h3>
                    <button class="actor-tag" onclick="editTheme('${t.id}')">편집</button>
                </div>
                <div class="theme-grid">
                    ${t.works.map(w => `
                        <div class="theme-poster-box">
                            <img src="${w.poster}">
                            <div style="font-weight:800; font-size:0.8rem; margin-top:5px;">${w.title}</div>
                            <div class="theme-work-tags">${w.tags||""}</div>
                        </div>`).join('')}
                </div>
            </div>`).join('');
    }

    function openThemeWrite() {
        tempThemeWorks = []; document.getElementById('editingThemeId').value = "";
        document.getElementById('themeNameInput').value = ""; document.getElementById('added-items-preview').innerHTML = "";
        goScreen('screen-theme-write');
    }

    async function editTheme(id) {
        const t = themes.find(x => x.id == id); tempThemeWorks = [...t.works];
        document.getElementById('editingThemeId').value = t.id; document.getElementById('themeNameInput').value = t.name;
        renderThemePreview(); goScreen('screen-theme-write');
    }

    async function saveTheme() {
        const name = document.getElementById('themeNameInput').value; const id = document.getElementById('editingThemeId').value || Date.now().toString();
        await fetch('/api/proxy?type=themes', { method: 'POST', body: JSON.stringify({ id, name, works: tempThemeWorks }) });
        loadThemes();
    }

    async function deleteTheme() {
        const id = document.getElementById('editingThemeId').value;
        if(id && confirm("테마를 삭제할까요?")) { await fetch(`/api/proxy?type=themes&id=${id}`, { method: 'DELETE' }); loadThemes(); }
    }

    function confirmActor() { tempEntry.actor = document.getElementById('actorInput').value; document.getElementById('search-title').innerText = `${tempEntry.actor} 님의 입덕작`; goScreen('screen-work-search'); }

    async function saveRecord() {
        const tags = Array.from(document.querySelectorAll('#tag-pool .selected')).map(el => el.innerText);
        const existing = db.find(r => r.actor === tempEntry.actor);
        if(existing) await fetch(`/api/proxy?type=records&id=${existing.id}`, { method: 'DELETE' });
        const payload = { id: Date.now().toString(), actor: tempEntry.actor, work_title: tempEntry.work.title, poster_url: tempEntry.work.poster, tags };
        await fetch('/api/proxy?type=records', { method: 'POST', body: JSON.stringify(payload) });
        initListPage();
    }
</script>
</body>
</html>
