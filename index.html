<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕질 수납함</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Square+Round:wght@400;700;800&family=Nanum+Pen+Script&display=swap');

        :root { 
            --main: #78a2cc; --sub: #e59a8a; --bg: #f4f4f2; --paper: #ffffff; --text: #444; --danger: #e74c3c;
            --handwriting: 'Nanum Pen Script', cursive;
        }

        body { font-family: 'Nanum Square Round', sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }

        .app-container { 
            width: 100%; max-width: 800px; margin: 60px auto; min-height: 85vh; 
            background: var(--paper); padding: 50px 30px; box-sizing: border-box; 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.03); border: 1px solid #ddd; position: relative;
        }

        .tab-menu { display: flex; gap: 5px; position: absolute; top: -45px; left: 20px; }
        .tab-btn { padding: 12px 25px; background: #d1d1cf; border-radius: 12px 12px 0 0; border: 1px solid #bbb; border-bottom: none; cursor: pointer; font-weight: 700; color: #777; transition: 0.2s; }
        .tab-btn.active { background: var(--paper); color: var(--main); height: 50px; margin-top: -5px; z-index: 2; }

        .screen { display: none; animation: drawerOpen 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes drawerOpen { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 800; font-size: 2.2rem; color: var(--main); text-align: center; margin-bottom: 40px; }
        h2 { font-weight: 800; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }

        button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--main); color: white; width: 100%; }
        .btn-sub { background: var(--sub); color: white; }
        .btn-gray { background: #eee; color: #777; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; font-family: inherit; }

        /* 배우 인덱스 */
        .actor-index { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .actor-btn { background:white; border:1px solid #ddd; padding:6px 15px; font-size:0.85rem; border-radius:20px; cursor:pointer; }
        .actor-btn.selected { background: var(--main); color: white; border-color: var(--main); }

        /* 세로 티켓 */
        .record-cloud { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; justify-items: center; }
        .ticket-v { width: 160px; background: #fff; border: 1px solid #eee; border-radius: 10px; overflow: hidden; box-shadow: 5px 5px 15px rgba(0,0,0,0.05); position: relative; }
        .ticket-v-top { width: 100%; aspect-ratio: 2/3; overflow: hidden; position: relative; background: #eee; }
        .ticket-v-top img { width: 100%; height: 100%; object-fit: cover; }
        .rank-badge { position: absolute; top: 10px; right: 10px; background: var(--sub); color: white; padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: 800; z-index: 5; }

        .ticket-divider { height: 20px; background: #fff; position: relative; border-top: 2px dashed #eee; margin-top: -1px; }
        .ticket-divider::before, .ticket-divider::after { content: ""; position: absolute; top: -10px; width: 20px; height: 20px; background: var(--paper); border: 1px solid #eee; border-radius: 50%; }
        .ticket-divider::before { left: -11px; } .ticket-divider::after { right: -11px; }

        .ticket-v-bottom { padding: 10px 12px 15px; text-align: center; }
        .ticket-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
        .ticket-tags { font-family: var(--handwriting); font-size: 1.2rem; color: var(--main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ticket-ctrl { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .edit-link { font-size: 0.75rem; color: #aaa; cursor: pointer; text-decoration: underline; }
        .del-link { font-size: 0.75rem; color: var(--danger); cursor: pointer; text-decoration: underline; }

        /* 태그 시스템 */
        .tag-container { background: #fdfdfd; padding: 20px; border: 1px dashed var(--main); border-radius: 12px; margin-top: 15px; }
        .tag-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tag-chip { padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 0.85rem; cursor: pointer; background: white; }
        .tag-chip.selected { background: var(--main); color: white; border-color: var(--main); }

        /* 테마 */
        .theme-card { background: #fffef0; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 8px solid var(--main); position: relative; }
        .theme-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .theme-poster-box { width: 100px; flex-shrink: 0; text-align: center; }
        .theme-poster-box img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 5px; }
        .theme-poster-box p { font-size: 0.75rem; margin-top: 5px; font-weight: 800; margin-bottom: 0; }
        .theme-poster-box .theme-tags { font-family: var(--handwriting); font-size: 1rem; color: var(--main); margin-top: -2px; }

        .tmdb-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
        .tmdb-item { border-radius: 8px; overflow: hidden; cursor: pointer; border: 3px solid transparent; text-align: center; }
        .tmdb-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }

        /* 미리보기 작품 삭제 버튼 */
        .preview-item { position: relative; background: #eee; padding: 10px 30px 10px 15px; border-radius: 8px; font-size: 0.85rem; }
        .preview-item .del-x { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: var(--danger); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tab-menu">
        <div class="tab-btn active" onclick="goScreen('screen-main')">HOME</div>
        <div class="tab-btn" onclick="initListPage()">수납함</div>
        <div class="tab-btn" onclick="loadThemes()">테마</div>
    </div>

    <div id="screen-main" class="screen active">
        <h1>🗄️ 덕질 수납함</h1>
        <p style="text-align:center; font-family:var(--handwriting); font-size:1.6rem; color:#888; margin-top:-30px;">소중한 취향을 수집하고 삭제하며 가꾸세요</p>
        <div style="max-width:300px; margin: 40px auto; display:grid; gap:12px;">
            <button class="btn-main" onclick="initListPage()">📂 수납함 열기</button>
            <button class="btn-gray" onclick="startShout()">✏️ 새로운 입덕 보관</button>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>🎞️ ACTOR INDEX</h2>
            <button class="btn-sub" onclick="startShout()" style="padding:8px 15px; font-size:0.8rem;">+ 추가</button>
        </div>
        <div id="actor-index-area" class="actor-index"></div>
        <div id="record-display" class="record-cloud"></div>
    </div>

    <div id="screen-actor-search" class="screen">
        <h2 id="input-title">누구에게 입덕했나요?</h2>
        <input type="text" id="actorInput" placeholder="배우 이름 입력">
        <button class="btn-main" onclick="confirmActor()">다음으로</button>
    </div>

    <div id="screen-work-search" class="screen">
        <h2 id="current-target" style="color:var(--main);"></h2>
        <div id="search-box-area">
            <div style="display:flex; gap:10px;">
                <input type="text" id="workSearchInput" placeholder="작품명 검색" style="margin:0;">
                <button onclick="searchTMDB('work')" style="background:var(--text); color:white; width:60px; border-radius:8px;">🔍</button>
            </div>
            <div id="tmdb-results" class="tmdb-results"></div>
        </div>
        
        <div id="tag-area" style="display:none;">
            <div class="tag-container">
                <p style="font-weight:800; margin:0 0 12px 0;">입덕 포인트 (최대 3개)</p>
                <div id="tag-pool-work" class="tag-pool">
                    <div class="tag-chip" onclick="toggleTag(this)">#눈빛맛집</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#서사천재</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#비주얼</div>
                    <div class="tag-chip" onclick="toggleTag(this)">#연기력</div>
                </div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <input type="text" id="customTagInput" placeholder="#직접입력" style="margin:0; padding:10px;">
                    <button class="btn-gray" onclick="addCustomTag()" style="padding:0 15px; font-size:0.8rem;">추가</button>
                </div>
            </div>
            <button class="btn-main" style="background:var(--sub); margin-top:20px;" onclick="saveShout()">수납함에 보관 ✨</button>
        </div>
    </div>

    <div id="screen-theme-list" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>🔖 THEME ARCHIVE</h2>
            <button class="btn-sub" onclick="openThemeWrite()" style="padding:8px 15px; font-size:0.8rem;">+ 테마 생성</button>
        </div>
        <div id="theme-display-area"></div>
    </div>

    <div id="screen-theme-write" class="screen">
        <h2 id="theme-write-title">테마 관리</h2>
        <input type="hidden" id="editingThemeId">
        <input type="text" id="themeNameInput" placeholder="테마 제목 입력">
        
        <div style="background:#f9f9f9; padding:20px; border-radius:10px; margin-bottom:20px;">
            <p style="font-weight:800; margin-top:0;">작품 검색 후 추가</p>
            <div style="display:flex; gap:10px;">
                <input type="text" id="themeWorkSearch" placeholder="테마에 넣을 작품 검색" style="margin:0;">
                <button onclick="searchTMDB('theme')" style="background:var(--text); color:white; width:60px; border-radius:8px;">🔍</button>
            </div>
            <div id="theme-tmdb-results" class="tmdb-results"></div>
            <div id="theme-tag-input-area" style="display:none; margin-top:15px; background:white; padding:15px; border-radius:8px;">
                <p style="font-size:0.85rem; font-weight:800; margin-bottom:10px;">이 작품의 테마용 태그 입력</p>
                <input type="text" id="themeItemTag" placeholder="#예: #가슴절절 #최애픽" style="margin-bottom:10px;">
                <button class="btn-main" onclick="addWorkToTheme()">테마 목록에 추가</button>
            </div>
        </div>

        <p style="font-weight:800;">현재 테마 작품 목록 (삭제 가능)</p>
        <div id="added-items-preview" style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-gray" onclick="deleteTheme()" id="themeDelBtn" style="display:none; background:var(--danger); color:white;">테마 전체 삭제</button>
            <button class="btn-main" style="background:#2ecc71" onclick="saveTheme()">테마 저장 완료</button>
        </div>
    </div>
</div>

<script>
    let db = []; let themes = [];
    let tempEntry = { id: null, actor: '', work: null, tags: [] };
    let tempThemeWorks = [];
    let isEditMode = false;

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab-menu').forEach(btn => btn.classList.remove('active'));
        if(id === 'screen-main') document.querySelectorAll('.tab-btn')[0].classList.add('active');
        if(['screen-list', 'screen-actor-search', 'screen-work-search'].includes(id)) document.querySelectorAll('.tab-btn')[1].classList.add('active');
        if(['screen-theme-list', 'screen-theme-write'].includes(id)) document.querySelectorAll('.tab-btn')[2].classList.add('active');
    }

    async function initListPage() {
        goScreen('screen-list');
        const res = await fetch('/api/proxy?type=records');
        db = await res.json();
        renderActorIndex();
    }

    function renderActorIndex() {
        const area = document.getElementById('actor-index-area');
        const actors = [...new Set(db.map(item => item.actor))].sort((a, b) => a.localeCompare(b, 'ko'));
        area.innerHTML = actors.map(name => `<button class="actor-btn" onclick="showActorRecords('${name}', this)">${name}</button>`).join('');
        if(actors.length > 0) showActorRecords(actors[0], area.querySelector('.actor-btn'));
        else document.getElementById('record-display').innerHTML = "아직 기록이 없습니다.";
    }

    function showActorRecords(actorName, btnEl) {
        document.querySelectorAll('.actor-btn').forEach(b => b.classList.remove('selected'));
        if(btnEl) btnEl.classList.add('selected');

        const records = db.filter(r => r.actor === actorName);
        const counts = {};
        records.forEach(r => counts[r.work_title] = (counts[r.work_title] || 0) + 1);
        const sortedWorks = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        
        const display = document.getElementById('record-display');
        display.innerHTML = "";

        // 버그 수정: 이 배우가 가진 모든 개별 티켓을 고유 ID 기준으로 출력
        records.forEach(r => {
            const rankIndex = sortedWorks.findIndex(w => w[0] === r.work_title);
            let rankBadge = (rankIndex < 3) ? `<div class="rank-badge">${rankIndex + 1}위</div>` : "";
            display.innerHTML += `
                <div class="ticket-v">
                    <div class="ticket-v-top">${rankBadge}<img src="${r.poster_url}"></div>
                    <div class="ticket-divider"></div>
                    <div class="ticket-v-bottom">
                        <div class="ticket-title">${r.work_title}</div>
                        <div class="ticket-tags">${(r.tags || []).join(' ')}</div>
                        <div class="ticket-ctrl">
                            <span class="edit-link" onclick="openEditMode('${r.id}')">태그수정</span>
                            <span class="del-link" onclick="deleteRecord('${r.id}')">삭제</span>
                        </div>
                    </div>
                </div>`;
        });
    }

    function startShout() { 
        isEditMode = false;
        tempEntry = { id: null, actor: '', work: null, tags: [] };
        document.getElementById('input-title').innerText = "누구에게 입덕했나요?";
        document.getElementById('actorInput').value = "";
        document.getElementById('search-box-area').style.display = 'block';
        goScreen('screen-actor-search'); 
    }

    function openEditMode(id) {
        isEditMode = true;
        const target = db.find(i => i.id == id);
        if(!target) return;
        tempEntry = { ...target };
        document.getElementById('current-target').innerText = `✏️ '${target.work_title}' 태그 수정`;
        document.getElementById('search-box-area').style.display = 'none';
        document.getElementById('tag-area').style.display = 'block';
        
        const pool = document.getElementById('tag-pool-work');
        pool.innerHTML = ['#눈빛맛집','#서사천재','#비주얼','#연기력'].map(t => 
            `<div class="tag-chip ${tempEntry.tags.includes(t) ? 'selected' : ''}" onclick="toggleTag(this)">${t}</div>`
        ).join('');
        tempEntry.tags.forEach(t => {
            if(!['#눈빛맛집','#서사천재','#비주얼','#연기력'].includes(t)) {
                pool.innerHTML += `<div class="tag-chip selected" onclick="toggleTag(this)">${t}</div>`;
            }
        });
        goScreen('screen-work-search');
    }

    async function deleteRecord(id) {
        if(!confirm("이 기록을 삭제할까요?")) return;
        const res = await fetch(`/api/proxy?type=records&id=${id}`, { method: 'DELETE' });
        if(res.ok) { alert("삭제되었습니다."); initListPage(); }
    }

    function confirmActor() {
        tempEntry.actor = document.getElementById('actorInput').value.trim();
        if(tempEntry.actor) goScreen('screen-work-search');
    }

    async function searchTMDB(type) {
        const query = (type === 'work') ? document.getElementById('workSearchInput').value : document.getElementById('themeWorkSearch').value;
        const res = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        const area = document.getElementById(type === 'work' ? 'tmdb-results' : 'theme-tmdb-results');
        area.innerHTML = data.results?.map(item => {
            const title = (item.title || item.name).replace(/'/g, "");
            const poster = `https://image.tmdb.org/t/p/w400${item.poster_path}`;
            return `<div class="tmdb-item" onclick="selectWork('${title}', '${poster}', this, '${type}')"><img src="${poster}"><p style="font-size:0.7rem;">${title}</p></div>`;
        }).join('') || "결과 없음";
    }

    function selectWork(title, poster, el, type) {
        tempEntry.work = { title, poster };
        document.querySelectorAll('.tmdb-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById(type === 'work' ? 'tag-area' : 'theme-tag-input-area').style.display = 'block';
    }

    function toggleTag(el) {
        if(el.classList.contains('selected')) el.classList.remove('selected');
        else if(el.parentElement.querySelectorAll('.selected').length < 3) el.classList.add('selected');
    }

    function addCustomTag() {
        const val = document.getElementById('customTagInput').value.trim();
        if(!val) return;
        const tag = val.startsWith('#') ? val : '#' + val;
        const pool = document.getElementById('tag-pool-work');
        pool.innerHTML += `<div class="tag-chip selected" onclick="toggleTag(this)">${tag}</div>`;
        document.getElementById('customTagInput').value = "";
    }

    async function saveShout() {
        const tags = Array.from(document.querySelectorAll('#tag-pool-work .selected')).map(t => t.innerText);
        const payload = { 
            id: tempEntry.id || Date.now().toString(), 
            actor: tempEntry.actor, 
            work_title: isEditMode ? tempEntry.work_title : tempEntry.work.title, 
            poster_url: isEditMode ? tempEntry.poster_url : tempEntry.work.poster, 
            tags 
        };
        await fetch('/api/proxy?type=records', { method: 'POST', body: JSON.stringify(payload) });
        initListPage();
    }

    /* 테마 */
    async function loadThemes() {
        goScreen('screen-theme-list');
        const res = await fetch('/api/proxy?type=themes');
        themes = await res.json();
        document.getElementById('theme-display-area').innerHTML = themes.map(t => `
            <div class="theme-card">
                <h3 style="margin:0 0 15px 0;"># ${t.name}</h3>
                <button class="mini-btn" style="position:absolute; top:15px; right:15px;" onclick="editTheme('${t.id}')">수정</button>
                <div class="theme-scroll">${t.works.map(w => `
                    <div class="theme-poster-box">
                        <img src="${w.poster}">
                        <p>${w.title}</p>
                        <div class="theme-tags">${w.tags || ""}</div>
                    </div>`).join('')}
                </div>
            </div>`).join('');
    }

    function openThemeWrite() { 
        tempThemeWorks=[]; 
        document.getElementById('editingThemeId').value="";
        document.getElementById('themeNameInput').value=""; 
        document.getElementById('added-items-preview').innerHTML="";
        document.getElementById('themeDelBtn').style.display = 'none';
        goScreen('screen-theme-write'); 
    }

    function addWorkToTheme() {
        const tags = document.getElementById('themeItemTag').value.trim();
        tempThemeWorks.push({...tempEntry.work, tags});
        renderThemePreview();
        document.getElementById('themeItemTag').value = "";
        document.getElementById('theme-tag-input-area').style.display = 'none';
    }

    function renderThemePreview() {
        document.getElementById('added-items-preview').innerHTML = tempThemeWorks.map((w, idx) => `
            <div class="preview-item">
                <b>${w.title}</b> <small>${w.tags || ""}</small>
                <span class="del-x" onclick="removeWorkFromTheme(${idx})">✖</span>
            </div>`).join('');
    }

    function removeWorkFromTheme(idx) {
        tempThemeWorks.splice(idx, 1);
        renderThemePreview();
    }

    async function editTheme(id) {
        const target = themes.find(t => t.id == id);
        tempThemeWorks = [...target.works];
        document.getElementById('editingThemeId').value = target.id;
        document.getElementById('themeNameInput').value = target.name;
        document.getElementById('themeDelBtn').style.display = 'block';
        renderThemePreview();
        goScreen('screen-theme-write');
    }

    async function deleteTheme() {
        const id = document.getElementById('editingThemeId').value;
        if(confirm("테마를 완전히 삭제할까요?")) {
            await fetch(`/api/proxy?type=themes&id=${id}`, { method: 'DELETE' });
            loadThemes();
        }
    }

    async function saveTheme() {
        const name = document.getElementById('themeNameInput').value.trim();
        const id = document.getElementById('editingThemeId').value || Date.now().toString();
        const payload = { id, name, works: tempThemeWorks };
        await fetch('/api/proxy?type=themes', { method: 'POST', body: JSON.stringify(payload) });
        loadThemes();
    }
</script>
</body>
</html>
